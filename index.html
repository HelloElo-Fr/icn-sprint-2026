<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICN Design Sprint — 28 mars 2026</title>
<style>
:root {
  --blue:#1565C0; --bluel:#E3F2FD;
  --green:#2E7D32; --greenl:#E8F5E9;
  --purple:#7B1FA2; --purplel:#F3E5F5;
  --orange:#E65100; --orangel:#FFF3E0;
  --gold:#F9A825;
  --dark:#263238; --gray:#607D8B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#333;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}

/* Header */
.hdr{background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;padding:18px 16px;text-align:center;}
.hdr h1{font-size:1.3em;margin-bottom:3px;letter-spacing:.5px;}
.hdr .sub{font-size:0.8em;opacity:0.85;}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none;}
.tabs::-webkit-scrollbar{display:none;}
.tabs .tb{flex:0 0 auto;padding:11px 14px;text-align:center;cursor:pointer;font-weight:600;font-size:0.78em;border-bottom:3px solid transparent;color:#888;white-space:nowrap;transition:all .2s;scroll-snap-align:start;min-width:0;}
.tabs .tb.act{border-bottom-color:#1565C0;color:#1565C0;background:#E3F2FD;}
.tabs .tb:active{background:#f0f0f0;}

/* Panels */
.pnl{display:none;max-width:800px;margin:0 auto;padding:16px;}
.pnl.act{display:block;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.st{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.st .n{font-size:1.5em;font-weight:700;color:#1565C0;}
.st .l{font-size:0.68em;color:#607D8B;margin-top:2px;}

/* Section */
.sec{background:#fff;border-radius:14px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;}
.sec-h{background:var(--dark);color:#fff;padding:12px 16px;font-size:0.9em;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
.sec-h .bdg{background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:0.75em;}

/* Timeline */
.tl{position:relative;padding-left:26px;margin:14px 0;}
.tl::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:3px;background:linear-gradient(#1565C0,#7B1FA2,#E65100,#2E7D32);border-radius:2px;}
.tl-i{position:relative;margin-bottom:16px;}
.tl-d{position:absolute;left:-20px;top:3px;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px #1565C0;}
.tl-i h4{font-size:0.88em;margin-bottom:3px;}
.tl-i p{font-size:0.78em;color:#555;line-height:1.5;}

/* Room */
.rm{border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;margin-bottom:8px;}
.rm-n{background:#ECEFF1;padding:6px 10px;font-weight:600;font-size:0.8em;display:flex;justify-content:space-between;}
.rm-n .c{font-size:0.72em;color:#607D8B;}
.rm .tms{padding:6px 10px;}

/* Team row */
.tr{padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:0.82em;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.tr:last-child{border-bottom:none;}
.tr:active,.tr:hover{background:#E3F2FD;}
.tn{font-weight:600;}
.tc{color:#607D8B;font-size:0.85em;}
.tt{font-size:0.62em;padding:2px 6px;border-radius:6px;}
.tt-m{background:#E3F2FD;color:#1565C0;}
.tt-f{background:#FFF3E0;color:#E65100;}
.tt-c{background:#FCE4EC;color:#C2185B;}
.tt-b{background:#E8F5E9;color:#2E7D32;}
.tr .arrow{margin-left:auto;color:#bbb;font-size:0.9em;}

/* Village card */
.vg{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}
.vc{border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.vc .vh{padding:12px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.vc .vh h3{font-size:0.92em;}
.vc .vh .vi{font-size:0.7em;opacity:.9;text-align:right;}
.vc .vb{background:#fff;padding:10px 14px;}
.vc .vt{padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;font-size:0.82em;cursor:pointer;}
.vc .vt:last-child{border-bottom:none;}
.vc .vt:active{background:#f8f8f8;}

/* Equipes */
.eq-grid{display:grid;grid-template-columns:1fr;gap:10px;}
.eq-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .1s;}
.eq-card:active{transform:scale(.98);}
.eq-top{padding:10px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.eq-top h4{font-size:0.9em;}
.eq-top .eq-info{font-size:0.72em;opacity:.9;}
.eq-members{padding:10px 14px;display:none;}
.eq-card.open .eq-members{display:block;}
.eq-m{font-size:0.82em;padding:3px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.eq-m:last-child{border-bottom:none;}

/* Fac zone */
.fz{border-left:4px solid #1565C0;margin:10px 14px;padding:8px 12px;background:#FAFAFA;border-radius:0 10px 10px 0;}
.fz h3{font-size:0.85em;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fb{color:#fff;padding:3px 10px;border-radius:10px;font-size:0.7em;white-space:nowrap;}

/* Finale */
.fin{background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border:2px solid #F9A825;border-radius:14px;padding:18px;margin-bottom:16px;text-align:center;}
.fin h3{color:#E65100;font-size:1.05em;margin-bottom:6px;}
.fin p{font-size:0.85em;color:#555;}

/* Table */
.stbl{width:100%;border-collapse:collapse;font-size:0.78em;}
.stbl th{background:#ECEFF1;padding:7px 8px;text-align:left;font-weight:600;}
.stbl td{padding:5px 8px;border-bottom:1px solid #f0f0f0;}

/* Move items */
.mi{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:0.82em;flex-wrap:wrap;}
.mi:last-child{border-bottom:none;}
.ma{color:#F57F17;font-weight:700;}

/* Home chatbot */
.home-chat{background:#fff;border-radius:16px;box-shadow:0 2px 14px rgba(0,0,0,.1);margin-bottom:18px;overflow:hidden;}
.home-chat-hdr{background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;padding:18px 20px;display:flex;align-items:center;gap:14px;}
.home-chat-hdr .hc-icon{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.5em;flex-shrink:0;}
.home-chat-hdr .hc-text h3{font-size:1.05em;margin-bottom:3px;}
.home-chat-hdr .hc-text p{font-size:0.8em;opacity:.85;}
.home-chat-body{padding:16px;}
.hc-input-wrap{display:flex;gap:8px;}
.hc-input{flex:1;border:2px solid #e0e0e0;border-radius:14px;padding:13px 16px;font-size:1em;outline:none;transition:border-color .2s;}
.hc-input:focus{border-color:#1565C0;}
.hc-send{background:#1565C0;color:#fff;border:none;border-radius:14px;padding:0 20px;cursor:pointer;font-size:1.1em;transition:background .2s;min-height:48px;}
.hc-send:active{background:#0D47A1;}
.hc-quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.hc-quick button{background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:20px;padding:7px 14px;font-size:0.8em;cursor:pointer;font-weight:500;transition:all .15s;}
.hc-quick button:active{background:#1565C0;color:#fff;}
.hc-result{margin-top:14px;display:none;}
.hc-result.show{display:block;}
.hc-result-card{background:linear-gradient(135deg,#f0f4f8,#e8edf2);border-radius:14px;padding:16px 18px;font-size:0.9em;line-height:1.8;}
.hc-result-card strong{color:#0D47A1;}

/* Floating chat */
.chat-btn{position:fixed;bottom:18px;right:18px;width:54px;height:54px;border-radius:50%;background:#1565C0;color:#fff;border:none;font-size:1.4em;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .2s;}
.chat-btn:active{transform:scale(.9);}
.chat-box{position:fixed;bottom:80px;right:12px;width:calc(100vw - 24px);max-width:380px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:200;display:none;overflow:hidden;max-height:70vh;flex-direction:column;}
.chat-box.open{display:flex;}
.chat-hdr{background:#1565C0;color:#fff;padding:12px 16px;font-weight:600;font-size:0.9em;display:flex;justify-content:space-between;align-items:center;}
.chat-hdr .close{cursor:pointer;font-size:1.2em;opacity:.8;padding:4px;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;min-height:200px;max-height:50vh;}
.chat-msg{margin-bottom:10px;font-size:0.85em;line-height:1.6;}
.chat-msg.bot{background:#f0f4f8;padding:10px 14px;border-radius:14px 14px 14px 2px;max-width:90%;}
.chat-msg.user{background:#1565C0;color:#fff;padding:10px 14px;border-radius:14px 14px 2px 14px;max-width:80%;margin-left:auto;}
.chat-input{display:flex;border-top:1px solid #eee;padding:10px;}
.chat-input input{flex:1;border:1px solid #ddd;border-radius:20px;padding:10px 16px;font-size:0.88em;outline:none;}
.chat-input input:focus{border-color:#1565C0;}
.chat-input button{margin-left:8px;background:#1565C0;color:#fff;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1em;}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.modal-h{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0;}
.modal-h h3{font-size:1em;}
.modal-h .mx{cursor:pointer;font-size:1.2em;opacity:.8;padding:4px 8px;}
.modal-body{padding:14px 16px;}
.modal-info{font-size:0.82em;color:#607D8B;margin-bottom:10px;line-height:1.7;}
.modal-member{font-size:0.85em;padding:5px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.modal-member:last-child{border-bottom:none;}

/* Responsive */
@media(max-width:374px){
  .hdr h1{font-size:1.05em;}
  .tabs .tb{padding:9px 9px;font-size:0.7em;}
  .home-chat-hdr .hc-icon{width:38px;height:38px;font-size:1.2em;}
  .home-chat-hdr .hc-text h3{font-size:0.9em;}
  .hc-input{padding:10px 12px;font-size:0.9em;}
}
@media(min-width:600px){
  .stats{grid-template-columns:repeat(4,1fr);}
  .vg{grid-template-columns:1fr 1fr;}
  .eq-grid{grid-template-columns:1fr 1fr;}
  .rm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
}
@media(min-width:900px){
  .eq-grid{grid-template-columns:repeat(3,1fr);}
  .pnl{padding:24px;}
  .home-chat{max-width:600px;margin-left:auto;margin-right:auto;}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .chat-btn{bottom:calc(18px + env(safe-area-inset-bottom));}
  .chat-box{bottom:calc(80px + env(safe-area-inset-bottom));}
}
</style>
</head>

function chatSearch(query){
  const q = query.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  if(!q) return "Tape ton nom de famille ou un nom d'equipe !";

  // FAQ match
  for(const faq of FAQ){
    if(faq.q.some(kw => q.includes(kw))){
      return faq.a;
    }
  }

  // Team name match
  const teamMatch = TEAMS.find(t => {
    const tn = t.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    return tn === q || tn.includes(q);
  });
  if(teamMatch){
    const v = VILLAGES[teamMatch.village];
    return `<strong>Equipe ${teamMatch.name}</strong> (${teamMatch.members.length} pers.)<br>
      Salle : <strong>${ROOM_NAMES[teamMatch.room] || teamMatch.room}</strong>${teamMatch.table ? " — "+teamMatch.table : ""}<br>
      Village : <strong>${v.name} (${v.label})</strong><br>
      Pitch village : <strong>${v.pitchRoom}</strong><br>
      Pitch final : <strong>Salle du Conseil</strong>`;
  }

  // Person match
  let found = [];
  const qNorm = q;
  TEAMS.forEach(t => {
    t.members.forEach(m => {
      const full = (m[0]+" "+m[1]).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      const last = m[1].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      const first = m[0].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(full.includes(qNorm) || last.includes(qNorm) || first.includes(qNorm)){
        found.push({person:m, team:t});
      }
    });
  });

  if(found.length === 1){
    const {person:m, team:t} = found[0];
    const v = VILLAGES[t.village];
    return `<strong>${m[0]} ${m[1]}</strong><br>
      Equipe : <strong>${t.name}</strong><br>
      Salle : <strong>${ROOM_NAMES[t.room] || t.room}</strong>${t.table ? " — "+t.table : ""}<br>
      Village : <strong>${v.name} (${v.label})</strong><br>
      Pitch village : <strong>${v.pitchRoom}</strong><br>
      Pitch final : <strong>Salle du Conseil</strong>`;
  }
  if(found.length > 1 && found.length <= 8){
    return `${found.length} resultats :<br>` + found.map(f =>
      `&#8226; <strong>${f.person[0]} ${f.person[1]}</strong> — equipe ${f.team.name} (${f.team.room})`
    ).join("<br>");
  }
  if(found.length > 8){
    return `${found.length} resultats, sois plus precis ! Essaie avec ton nom de famille complet.`;
  }

  return `Pas de resultat pour "${query}".<br>Essaie :<br>&#8226; Ton <strong>nom de famille</strong><br>&#8226; Un nom de ville (Tokyo, Seoul...)<br>&#8226; Un mot-cle : <em>horaires, village, wifi, dejeuner, exercice, salle</em>`;
}

function init(){
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");
  tabDefs.forEach((t,i) => {
    const tb = document.createElement("div");
    tb.className = "tb" + (i===0?" act":"");
    tb.textContent = t.label;
    tb.dataset.id = t.id;
    tb.addEventListener("click", () => switchTab(t.id));
    tabsEl.appendChild(tb);
  });
  panelsEl.innerHTML = buildOverview() + buildPlanning() + buildVillages() + buildEquipes() + buildSalles() + buildFAQ();
  document.querySelectorAll(".team-click").forEach(el => {
    el.addEventListener("click", () => showTeamModal(el.dataset.team));
  });
  document.querySelectorAll(".eq-card").forEach(el => {
    el.addEventListener("click", () => el.classList.toggle("open"));
  });
}

function switchTab(id){
  document.querySelectorAll(".tb").forEach(t => t.classList.toggle("act", t.dataset.id===id));
  document.querySelectorAll(".pnl").forEach(p => p.classList.toggle("act", p.id==="p-"+id));
}

  let html = `<div class="pnl" id="p-salles"><h2 style="font-size:1.05em;margin-bottom:14px;color:#2E7D32;">Repartition par salle</h2>`;
  for(const [room, teams] of Object.entries(rooms)){
    const ppl = teams.reduce((s,t)=>s+t.members.length,0);
    html += `<div class="sec"><div class="sec-h">${ROOM_NAMES[room] || room}<span class="bdg">${ppl} pers. / ${teams.length} eq.</span></div><div style="padding:8px 12px;">`;
    teams.forEach(t => {
      const typeClass = t.type==="MIXTE"?"tt-m":t.type==="FR PUR"?"tt-f":t.type==="COMEX"?"tt-c":"tt-b";
      html += `<div class="tr team-click" data-team="${t.name}"><span class="tn">${t.name}</span> <span class="tt ${typeClass}">${t.type}</span> <span class="tc">— ${t.members.length} pers.${t.table?" — "+t.table:""}</span><span class="arrow">&#9656;</span></div>`;
    });
    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

// ============ MODAL ============
function showTeamModal(name){
  const t = TEAMS.find(x=>x.name===name);
  if(!t) return;
  const v = VILLAGES[t.village];
  document.getElementById("modalTitle").textContent = "Equipe " + t.name;
  document.getElementById("modalH").style.background = t.vColor;
  document.getElementById("modalBody").innerHTML = `
    <div class="modal-info">
      <strong>Type :</strong> ${t.type} | <strong>${t.members.length} personnes</strong><br>
      <strong>Salle :</strong> ${ROOM_NAMES[t.room] || t.room}${t.table?" — "+t.table:""}<br>
      <strong>Village :</strong> ${v.name} (${v.label}) — Pitch : ${v.pitchRoom}<br>
      <strong>Pitch final :</strong> Salle du Conseil
    </div>
    <div style="font-weight:600;font-size:0.85em;margin-bottom:6px;">Membres :</div>
    ${t.members.map(m=>`<div class="modal-member"><span>${m[0]} <strong>${m[1]}</strong></span><span style="font-size:0.82em;color:#999;">${m[2]}</span></div>`).join("")}
  `;
  document.getElementById("modalBg").classList.add("open");
}
document.getElementById("modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")e.target.classList.remove("open");});
document.getElementById("modalClose").addEventListener("click",()=>document.getElementById("modalBg").classList.remove("open"));

// ============ FLOATING CHATBOT ============
document.getElementById("chatBtn").addEventListener("click",()=>document.getElementById("chatBox").classList.toggle("open"));
document.getElementById("chatClose").addEventListener("click",()=>document.getElementById("chatBox").classList.remove("open"));

function sendChat(){
  const input = document.getElementById("chatIn");
  const q = input.value.trim();
  if(!q) return;
  const msgs = document.getElementById("chatMsgs");
  msgs.innerHTML += `<div class="chat-msg user">${q}</div>`;
  const answer = chatSearch(q);
  msgs.innerHTML += `<div class="chat-msg bot">${answer}</div>`;
  input.value = "";
  msgs.scrollTop = msgs.scrollHeight;
}
document.getElementById("chatSend").addEventListener("click", sendChat);
document.getElementById("chatIn").addEventListener("keydown", e=>{if(e.key==="Enter")sendChat();});

// ============ HOME CHATBOT ============
function homeDoSearch(){
  const input = document.getElementById("homeSearch");
  const q = input.value.trim();
  if(!q) return;
  const result = chatSearch(q);
  document.getElementById("homeResultCard").innerHTML = result;
  document.getElementById("homeResult").classList.add("show");
}
function homeQuick(val){
  document.getElementById("homeSearch").value = val;
  homeDoSearch();
}
document.addEventListener("click",e=>{if(e.target.id==="homeSearchBtn") homeDoSearch();});
document.addEventListener("keydown",e=>{if(e.target.id==="homeSearch" && e.key==="Enter") homeDoSearch();});

// ============ EQUIPES SEARCH ============
document.addEventListener("input", e=>{
  if(e.target.id==="eqSearch"){
    const q = e.target.value.toLowerCase();
    document.querySelectorAll(".eq-card").forEach(c=>{
      c.style.display = c.dataset.search.includes(q) ? "" : "none";
    });
  }
});

// ============ INIT ============
init();
</script>
