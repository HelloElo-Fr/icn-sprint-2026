<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICN Creativ Day — 28 mars 2026</title>
<style>
:root {
  --yellow:#F9A825; --yl:#FFF8E1;
  --green:#2E7D32; --gl:#E8F5E9;
  --pink:#E91E63; --pkl:#FCE4EC;
  --orange:#E65100; --ol:#FFF3E0;
  --purple:#7B1FA2; --pl:#F3E5F5;
  --cyan:#00838F; --cl:#E0F7FA;
  --blue:#1565C0; --bl:#E3F2FD;
  --dark:#1a1a1a; --gray:#607D8B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#333;-webkit-tap-highlight-color:transparent;}

/* Header */
.hdr{background:linear-gradient(135deg,#E65100,#F57F17);color:#fff;padding:18px 16px;text-align:center;position:relative;}
.hdr h1{font-size:1.3em;margin-bottom:2px;letter-spacing:1px;}
.hdr .sub{font-size:0.78em;opacity:0.85;}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:0;}
.tabs .tb{flex:1 0 auto;padding:10px 10px;text-align:center;cursor:pointer;font-weight:600;font-size:0.72em;border-bottom:3px solid transparent;color:#888;white-space:nowrap;transition:all .2s;min-width:0;}
.tabs .tb.act{border-bottom-color:#E65100;color:#E65100;background:#FFF3E0;}
.tabs .tb:active{background:#f0f0f0;}

/* Panels */
.pnl{display:none;max-width:1100px;margin:0 auto;padding:14px;}
.pnl.act{display:block;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.st{background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.st .n{font-size:1.4em;font-weight:700;color:#1565C0;}
.st .l{font-size:0.65em;color:#607D8B;}

/* Section */
.sec{background:#fff;border-radius:12px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;}
.sec-h{background:#E65100;color:#fff;padding:10px 14px;font-size:0.88em;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
.sec-h .bdg{background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:0.75em;}

/* Fac zone */
.fz{border-left:4px solid #1565C0;margin:10px 12px;padding:6px 10px;background:#FAFAFA;border-radius:0 8px 8px 0;}
.fz h3{font-size:0.82em;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.fb{color:#fff;padding:2px 8px;border-radius:10px;font-size:0.68em;white-space:nowrap;}

/* Room */
.rm{border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:8px;}
.rm-n{background:#ECEFF1;padding:5px 8px;font-weight:600;font-size:0.78em;display:flex;justify-content:space-between;}
.rm-n .c{font-size:0.72em;color:#607D8B;}
.rm .tms{padding:4px 8px;}

/* Team row (clickable) */
.tr{padding:3px 0;border-bottom:1px solid #f0f0f0;font-size:0.78em;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s;}
.tr:last-child{border-bottom:none;}
.tr:active,.tr:hover{background:#E3F2FD;}
.tn{font-weight:600;}
.tc{color:#607D8B;font-size:0.85em;}
.tt{font-size:0.6em;padding:1px 5px;border-radius:6px;}
.tt-m{background:#E3F2FD;color:#1565C0;}
.tt-f{background:#FFF3E0;color:#E65100;}
.tt-b{background:#E8F5E9;color:#2E7D32;}
.tt-c{background:#FCE4EC;color:#C2185B;}
.tr .arrow{margin-left:auto;color:#bbb;font-size:0.9em;}

/* Village card */
.vg{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px;}
.vc{border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08);}
.vc .vh{padding:10px 12px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.vc .vh h3{font-size:0.88em;}
.vc .vh .vi{font-size:0.68em;opacity:.9;text-align:right;}
.vc .vb{background:#fff;padding:8px 12px;}
.vc .vt{padding:4px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;font-size:0.8em;}
.vc .vt:last-child{border-bottom:none;}
.vc .vl{padding:6px 10px;font-size:0.72em;background:#FAFAFA;border-top:1px solid #eee;}
.mv{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#FFF8E1;color:#F57F17;}
.sy{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#E8F5E9;color:#2E7D32;}
.fl{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#FFEBEE;color:#C62828;}

/* Equipes list */
.eq-grid{display:grid;grid-template-columns:1fr;gap:8px;}
.eq-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .1s;}
.eq-card:active{transform:scale(.98);}
.eq-top{padding:8px 12px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.eq-top h4{font-size:0.88em;}
.eq-top .eq-info{font-size:0.7em;opacity:.9;}
.eq-members{padding:8px 12px;display:none;}
.eq-card.open .eq-members{display:block;}
.eq-m{font-size:0.78em;padding:2px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.eq-m:last-child{border-bottom:none;}

/* Timeline */
.tl{position:relative;padding-left:24px;margin:12px 0;}
.tl::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:3px;background:linear-gradient(#1565C0,#7B1FA2,#E65100);border-radius:2px;}
.tl-i{position:relative;margin-bottom:14px;}
.tl-d{position:absolute;left:-19px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px #1565C0;}
.tl-i h4{font-size:0.85em;margin-bottom:2px;}
.tl-i p{font-size:0.75em;color:#555;line-height:1.4;}

/* Finale */
.fin{background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border:2px solid #F9A825;border-radius:12px;padding:16px;margin-bottom:14px;text-align:center;}
.fin h3{color:#E65100;font-size:1em;margin-bottom:6px;}
.fin p{font-size:0.82em;color:#555;}

/* Table */
.stbl{width:100%;border-collapse:collapse;font-size:0.76em;}
.stbl th{background:#ECEFF1;padding:6px 8px;text-align:left;font-weight:600;}
.stbl td{padding:4px 8px;border-bottom:1px solid #f0f0f0;}

/* Move items */
.mi{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:0.8em;flex-wrap:wrap;}
.mi:last-child{border-bottom:none;}
.ma{color:#F57F17;font-weight:700;}
.tf{background:#FFEBEE;padding:1px 6px;border-radius:6px;color:#C62828;font-size:0.7em;font-weight:600;}
.ts{background:#E8F5E9;padding:1px 6px;border-radius:6px;color:#2E7D32;font-size:0.7em;font-weight:600;}

/* Chatbot */
.chat-btn{position:fixed;bottom:16px;right:16px;height:54px;border-radius:27px;background:linear-gradient(135deg,#E91E63,#F06292);color:#fff;border:none;font-size:0.9em;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(233,30,99,.4);z-index:200;display:flex;align-items:center;justify-content:center;gap:8px;padding:0 22px;transition:transform .2s;animation:chatPulse 2s ease-in-out infinite;}
.chat-btn:active{transform:scale(.9);}
@keyframes chatPulse{0%,100%{box-shadow:0 6px 20px rgba(233,30,99,.4);transform:scale(1)}50%{box-shadow:0 6px 28px rgba(233,30,99,.6);transform:scale(1.03)}}
.chat-box{position:fixed;bottom:76px;right:12px;width:calc(100vw - 24px);max-width:360px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:200;display:none;overflow:hidden;max-height:70vh;flex-direction:column;}
.chat-box.open{display:flex;}
.chat-hdr{background:linear-gradient(135deg,#E91E63,#F06292);color:#fff;padding:12px 16px;font-weight:600;font-size:0.88em;display:flex;justify-content:space-between;align-items:center;}
.chat-hdr .close{cursor:pointer;font-size:1.2em;opacity:.8;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;min-height:200px;max-height:50vh;}
.chat-msg{margin-bottom:10px;font-size:0.82em;line-height:1.5;}
.chat-msg.bot{background:#f0f4f8;padding:8px 12px;border-radius:12px 12px 12px 2px;max-width:90%;}
.chat-msg.user{background:#1565C0;color:#fff;padding:8px 12px;border-radius:12px 12px 2px 12px;max-width:80%;margin-left:auto;}
.chat-input{display:flex;border-top:1px solid #eee;padding:8px;}
.chat-input input{flex:1;border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:0.85em;outline:none;}
.chat-input input:focus{border-color:#1565C0;}
.chat-input button{margin-left:6px;background:#E91E63;color:#fff;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1em;}

/* Modal overlay */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.modal-h{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0;}
.modal-h h3{font-size:0.95em;}
.modal-h .mx{cursor:pointer;font-size:1.2em;opacity:.8;padding:4px 8px;}
.modal-body{padding:12px 16px;}
.modal-info{font-size:0.78em;color:#607D8B;margin-bottom:8px;line-height:1.6;}
.modal-member{font-size:0.82em;padding:4px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.modal-member:last-child{border-bottom:none;}

/* Poll styles */
.poll-waiting{text-align:center;padding:40px 20px;color:#607D8B;}
.poll-waiting .pw-icon{font-size:2.5em;margin-bottom:12px;}
.poll-waiting .pw-title{font-size:1em;font-weight:600;color:#263238;margin-bottom:6px;}
.poll-waiting .pw-sub{font-size:0.8em;line-height:1.5;}
.poll-q{background:#fff;border-radius:14px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;display:none;}
.poll-q.active{display:block;animation:pollSlide .4s ease-out;}
@keyframes pollSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.poll-qh{background:linear-gradient(135deg,#E65100,#F57F17);color:#fff;padding:16px 18px;}
.poll-qh h3{font-size:1.05em;margin-bottom:4px;line-height:1.3;}
.poll-qh .poll-sub{font-size:0.78em;opacity:.85;font-style:italic;}
.poll-qnum{font-size:0.65em;opacity:.6;margin-bottom:6px;}
.poll-body{padding:16px 18px;}
.poll-input{width:100%;border:2px solid #e0e0e0;border-radius:12px;padding:12px 16px;font-size:1em;outline:none;resize:none;font-family:inherit;transition:border .2s;-webkit-appearance:none;}
.poll-input:focus{border-color:#1565C0;}
.poll-charcount{font-size:0.7em;color:#B0BEC5;text-align:right;margin-top:4px;transition:color .2s;}
.poll-charcount.warn{color:#E65100;}
.poll-send{background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:1em;font-weight:600;cursor:pointer;margin-top:10px;width:100%;transition:all .2s;-webkit-appearance:none;}
.poll-send:active{background:#1B5E20;transform:scale(.98);}
.poll-send:disabled{background:#B0BEC5;cursor:default;transform:none;}
.poll-done{text-align:center;padding:24px;color:#2E7D32;font-size:0.95em;}
.poll-done .pd-icon{font-size:2em;margin-bottom:8px;}
.poll-done .pd-text{font-weight:600;}
.poll-done .pd-wait{font-size:0.78em;color:#607D8B;margin-top:6px;}
.poll-count{font-size:0.75em;color:#607D8B;margin-top:8px;text-align:center;font-weight:600;}
/* Word cloud */
.wc-box{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:14px;min-height:180px;text-align:center;overflow:hidden;}
.wc-word{display:inline-block;padding:4px 10px;margin:3px;border-radius:20px;font-weight:600;animation:wcIn .4s ease-out;transition:all .3s;}
@keyframes wcIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
/* Open text results */
.ot-list{max-height:400px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ot-item{background:#f8f9fa;border-left:3px solid #1565C0;padding:8px 12px;margin:6px 0;border-radius:0 8px 8px 0;font-size:0.82em;animation:otIn .3s ease-out;word-break:break-word;}
@keyframes otIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
/* Journey Map */
.jm-box{background:#fff;border-radius:14px;padding:16px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:none;}
.jm-box.visible{display:block;}
.jm-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px;}
.jm-loc{border-radius:10px;padding:10px;text-align:center;cursor:default;transition:transform .2s;}
.jm-loc .jm-n{font-weight:700;font-size:0.75em;margin-bottom:2px;}
.jm-loc .jm-c{font-size:1.3em;font-weight:700;}
.jm-loc .jm-l{font-size:0.58em;opacity:.7;margin-top:2px;}
/* Facilitator sub-tabs */
.fac-tabs{display:flex;background:#E3F2FD;border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:0;margin-bottom:14px;padding:3px;}
.fac-tab{flex:0 0 auto;padding:8px 12px;text-align:center;cursor:pointer;font-weight:600;font-size:0.72em;border-radius:8px;color:#607D8B;white-space:nowrap;transition:all .2s;}
.fac-tab.act{background:#1565C0;color:#fff;box-shadow:0 2px 6px rgba(21,101,192,.3);}
.fac-tab:active{opacity:.7;}
.fac-panel{display:none;}
.fac-panel.act{display:block;}
.fac-dist-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:0.8em;}
.fac-dist-label{min-width:90px;font-weight:600;font-size:0.82em;}
.fac-dist-bar-bg{flex:1;height:24px;background:#f0f0f0;border-radius:6px;overflow:hidden;position:relative;}
.fac-dist-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:0.7em;font-weight:700;color:#fff;min-width:0;transition:width .5s;}
.fac-dist-count{min-width:40px;text-align:right;font-weight:600;color:#607D8B;font-size:0.85em;}
.fac-team-group-label{font-size:0.82em;font-weight:700;color:#1565C0;margin:14px 0 8px;padding:6px 10px;background:#E3F2FD;border-radius:8px;}
.fac-team-group-label.other{color:#607D8B;background:#ECEFF1;}
/* Presenter mode */
.presenter .hdr,.presenter .tabs,.presenter .chat-btn,.presenter .chat-box{display:none!important;}
.presenter .pnl{max-width:100%;padding:20px 40px;}
.presenter .poll-waiting{padding:80px 20px;}
.presenter .poll-waiting .pw-icon{font-size:4em;}
.presenter .poll-waiting .pw-title{font-size:2em;}
.presenter .pw-presenter-only{display:block!important;}
.presenter .poll-waiting .pw-icon{animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.8}}
.presenter .wc-box{min-height:350px;}
.presenter .wc-word{font-size:1.3em!important;padding:6px 18px!important;margin:5px!important;}
.presenter .ot-list{max-height:500px;}
.presenter .ot-item{font-size:1em;padding:10px 16px;}
.presenter .jm-grid{grid-template-columns:repeat(5,1fr);}
.presenter .jm-loc .jm-c{font-size:2.2em;}
.presenter .jm-loc .jm-n{font-size:0.85em;}
.presenter .poll-qh h3{font-size:1.6em;}
.presenter .poll-qh .poll-sub{font-size:1em;}
.presenter .poll-bilingual{display:block!important;font-size:1.1em!important;opacity:.9!important;margin-top:6px!important;}
.presenter .poll-count{font-size:1.1em;}
.presenter .poll-body .poll-input,.presenter .poll-body .poll-send,.presenter .poll-body .char-count,.presenter .poll-body textarea,.presenter .poll-body button.poll-send{display:none!important;}
.presenter .poll-body{padding:20px 40px;}
.presenter .poll-q{display:none!important;}
.presenter .poll-q.active{display:block!important;}
.presenter .adm-panel{display:none!important;}
.presenter #pollWaiting{flex-direction:column;align-items:center;justify-content:center;min-height:70vh;}
.presenter #jmBox{display:none!important;}
.presenter #p-polls{display:block!important;}
.presenter .pnl:not(#p-polls){display:none!important;}
.presenter .poll-q.active .poll-body{display:block!important;min-height:400px;}
.presenter .poll-q:not(.active) .poll-body{display:none!important;}
/* Admin panel */
.adm-panel{background:#263238;color:#fff;border-radius:14px;padding:16px;margin-bottom:16px;}
.adm-panel h3{font-size:0.95em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.adm-row{display:flex;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid #37474F;flex-wrap:wrap;}
.adm-row:last-child{border-bottom:none;}
.adm-row .adm-label{flex:1;font-size:0.82em;min-width:120px;}
.adm-btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.8em;font-weight:600;transition:all .15s;}
.adm-btn:active{transform:scale(.95);}
.adm-btn-go{background:#2E7D32;color:#fff;}
.adm-btn-stop{background:#F57F17;color:#fff;}
.adm-btn-danger{background:#C62828;color:#fff;}
.adm-btn-export{background:#1565C0;color:#fff;}
.adm-btn:disabled{background:#555;color:#999;cursor:default;transform:none;}
.adm-status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
.adm-status.on{background:#4CAF50;box-shadow:0 0 6px #4CAF50;}
.adm-status.off{background:#616161;}

/* Journey Map Multi-phase */
.jm-phase-label{text-align:center;font-size:0.82em;font-weight:700;color:#E65100;margin-bottom:8px;}
.jm-phase-badge{display:inline-block;background:#E65100;color:#fff;padding:2px 10px;border-radius:12px;font-size:0.72em;margin-left:6px;}
.jm-summary{background:#f8f9fa;border-radius:12px;padding:14px;margin-top:12px;}
.jm-summary h4{font-size:0.88em;color:#263238;margin-bottom:10px;}
.jm-summary-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eee;font-size:0.8em;}
.jm-summary-row:last-child{border-bottom:none;}
.jm-summary-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.jm-summary-phase{font-weight:600;min-width:90px;}
.jm-summary-loc{flex:1;}
/* Admin JM controls */
.adm-jm-section{background:#1a2327;border-radius:10px;padding:12px;margin-top:12px;}
.adm-jm-section h4{font-size:0.88em;margin-bottom:10px;color:#90CAF9;}
.adm-jm-phase-row{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid #37474F;flex-wrap:wrap;}
.adm-jm-phase-row:last-child{border-bottom:none;}
.adm-jm-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7em;font-weight:700;color:#fff;min-width:60px;text-align:center;}
.adm-jm-badge.active{background:#4CAF50;animation:admPulse 1.5s infinite;}
@keyframes admPulse{0%,100%{opacity:1}50%{opacity:.6}}
.adm-jm-count{font-size:0.75em;color:#90CAF9;margin-left:auto;min-width:40px;text-align:right;}
.hm-table{width:100%;border-collapse:collapse;font-size:0.72em;margin-top:10px;}
.hm-table th{background:#37474F;color:#CFD8DC;padding:5px 4px;text-align:center;font-weight:600;}
.hm-table td{padding:4px;text-align:center;border:1px solid #455A64;color:#fff;font-weight:600;}
.hm-table td.hm-label{text-align:left;font-weight:700;padding-left:8px;}
.evo-bars{margin-top:10px;}
.evo-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:0.75em;color:#CFD8DC;}
.evo-label{min-width:80px;font-weight:600;}
.evo-bar-container{flex:1;display:flex;height:22px;border-radius:4px;overflow:hidden;background:#37474F;}
.evo-bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:700;color:#fff;min-width:0;transition:width .5s;}
.money-shot{background:#1a2327;border-radius:10px;padding:12px;margin-top:10px;text-align:center;}
.money-shot .ms-number{font-size:2em;font-weight:800;color:#4CAF50;}
.money-shot .ms-label{font-size:0.8em;color:#90CAF9;margin-top:4px;}
/* Facilitateur tab */
.fac-select{width:100%;padding:12px;border:2px solid #1565C0;border-radius:12px;font-size:1em;background:#fff;margin-bottom:14px;}
.fac-team-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;}
.fac-team-hdr{padding:10px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:0.9em;}
.fac-team-body{padding:12px 14px;}
.fac-jm-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px;}
.fac-jm-btn{border:2px solid transparent;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s;font-size:0.72em;font-weight:600;}
.fac-jm-btn:hover{transform:scale(1.05);}
.fac-jm-btn.selected{border-color:#263238;box-shadow:0 0 0 2px rgba(0,0,0,.15);}
.fac-phase-info{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:#E3F2FD;border-radius:8px;font-size:0.82em;color:#0D47A1;font-weight:600;}
.fac-phase-dot{width:10px;height:10px;border-radius:50%;background:#4CAF50;animation:admPulse 1.5s infinite;}
.fac-no-phase{text-align:center;padding:20px;color:#607D8B;font-size:0.85em;}
.fac-submitted{text-align:center;padding:8px;color:#2E7D32;font-size:0.82em;font-weight:600;}
/* Responsive */
@media(max-width:599px){
  .jm-grid,.fac-jm-grid{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:600px){
  .stats{grid-template-columns:repeat(6,1fr);}
  .vg{grid-template-columns:1fr 1fr;}
  .eq-grid{grid-template-columns:1fr 1fr;}
  .rm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .jm-grid,.fac-jm-grid{grid-template-columns:repeat(5,1fr);}
}
@media(min-width:900px){
  .vg{grid-template-columns:repeat(3,1fr);}
  .eq-grid{grid-template-columns:repeat(3,1fr);}
}
/* Workflow Infographies */
.wf-panel{background:#1a2327;border-radius:12px;margin-top:14px;overflow:hidden;}
.wf-panel-title{padding:12px 16px;font-size:0.92em;font-weight:700;display:flex;align-items:center;gap:8px;}
.wf-bloc{border-top:1px solid #37474F;padding:14px 16px;}
.wf-bloc-hdr{padding:8px 12px;border-radius:8px;font-weight:700;font-size:0.85em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.wf-step{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #2a3439;}
.wf-step:last-child{border-bottom:none;}
.wf-step-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.82em;color:#fff;}
.wf-step-body{flex:1;min-width:0;}
.wf-step-title{font-weight:700;font-size:0.82em;margin-bottom:3px;}
.wf-step-desc{font-size:0.75em;color:#B0BEC5;line-height:1.4;}
.wf-prompt{background:#263238;border:1px solid #455A64;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:0.7em;color:#CFD8DC;white-space:pre-wrap;max-height:180px;overflow-y:auto;line-height:1.5;font-family:'Courier New',monospace;}
.wf-copy-btn{display:inline-flex;align-items:center;gap:4px;background:#1565C0;color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:0.72em;font-weight:600;margin-top:6px;transition:all .15s;}
.wf-copy-btn:active{transform:scale(.95);}
.wf-copy-btn.copied{background:#2E7D32;}
.wf-slides-btn{display:inline-flex;align-items:center;gap:4px;background:#1565C0;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.78em;font-weight:600;margin-top:8px;text-decoration:none;transition:all .15s;}
.wf-slides-btn:hover{background:#1976D2;}
</style>

const isFacMode = (()=>{const p=new URLSearchParams(window.location.search);return p.has("fac");})();
const currentFacKey = (()=>{
  if(!isFacMode) return null;
  const p = new URLSearchParams(window.location.search).get("fac");

  const entry = Object.entries(FAC_MAP).find(([k,v])=>v.name===p);
  return entry ? entry[0] : null;
})();

];

function init(){
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");
  tabDefs.forEach((t,i) => {
    const tb = document.createElement("div");
    tb.className = "tb" + (i===0?" act":"");
    tb.textContent = t.fr;
    tb.dataset.id = t.id;
    tb.dataset.fr = t.fr;
    tb.dataset.en = t.en;
    tb.addEventListener("click", () => switchTab(t.id));
    tabsEl.appendChild(tb);
  });
  panelsEl.innerHTML = buildOverview() + buildAgenda() + buildPolls() + buildPhase1() + buildPhase2() + buildEquipes() + buildFinale();
  document.querySelectorAll(".team-click").forEach(el => {
    el.addEventListener("click", () => showTeamModal(el.dataset.team));
  });
  document.querySelectorAll(".eq-card").forEach(el => {
    el.addEventListener("click", () => el.classList.toggle("open"));
  });
}

function switchTab(id){
  document.querySelectorAll(".tb").forEach(t => t.classList.toggle("act", t.dataset.id===id));
  document.querySelectorAll(".pnl").forEach(p => p.classList.toggle("act", p.id==="p-"+id));
}

function buildPhase1(){
  // Fac 1 (Nash): Conseil(BARCELONA) + 202(LYON) + 206(DUBLIN, BUENOS AIRES)
  const f1a = TEAMS.filter(t=>t.p1Room==="Conseil"&&t.fac==="Fac 1");
  const f1b = TEAMS.filter(t=>t.p1Room==="202"&&t.fac==="Fac 1");
  const f1c = TEAMS.filter(t=>t.p1Room==="206"&&t.fac==="Fac 1");
  // Fac 2 (Héloïse): Conseil(NAIROBI) + 101(SEOUL, MARRAKECH, LE CAP) + 107(COMEX)
  const f2a_conseil = TEAMS.filter(t=>t.p1Room==="Conseil"&&t.fac==="Fac 2");
  const f2a = TEAMS.filter(t=>t.p1Room==="101"&&t.fac==="Fac 2");
  const f2b = TEAMS.filter(t=>t.p1Room==="107"&&t.fac==="Fac 2");
  // Fac 3 (John-Edwin): Conseil(TOKYO) + 112(SAN FRANCISCO, BERLIN, SINGAPOUR) + 104(MARSEILLE)
  const f3a_conseil = TEAMS.filter(t=>t.p1Room==="Conseil"&&t.fac==="Fac 3");
  const f3a = TEAMS.filter(t=>t.p1Room==="112"&&t.fac==="Fac 3");
  const f3b = TEAMS.filter(t=>t.p1Room==="104"&&t.fac==="Fac 3");
  // Fac 4 (Zeenat): Conseil(MONTREAL) + 207(AMSTERDAM, SYDNEY, MUMBAI, RIO)
  const f4a_conseil = TEAMS.filter(t=>t.p1Room==="Conseil"&&t.fac==="Fac 4");
  const f4a = TEAMS.filter(t=>t.p1Room==="207"&&t.fac==="Fac 4");
  // Fac 5 (Anne): 205(LISBONNE, VANCOUVER) + 202(HELSINKI)
  const f5a = TEAMS.filter(t=>t.p1Room==="205"&&t.fac==="Fac 5");
  const f5b = TEAMS.filter(t=>t.p1Room==="202"&&t.fac==="Fac 5");

  function roomBlock(name,cap,teams){
    const searchData = teams.map(t=>t.name+" "+t.members.map(m=>m[0]+" "+m[1]).join(" ")).join(" ").toLowerCase();
    return `<div class="rm room-block" data-search="${searchData}"><div class="rm-n">${name}<span class="c">${cap} pl.</span></div><div class="tms">${teams.map(t=>teamRow(t,false)).join("")}</div></div>`;
  }
  function facZone(color,badge,title,rooms){
    return `<div class="fz" style="border-left-color:${color}"><h3><span class="fb" style="background:${color}">${badge}</span>${title}</h3><div class="rm-grid">${rooms}</div></div>`;
  }

  const zones = [
    {key:"Fac 1",color:"#1565C0",title:"Zone Nash — 4 eq.",floor:1,rooms:roomBlock("Salle du Conseil",90,f1a)+roomBlock("202 Rosa Parks",20,f1b)+roomBlock("206 Jean Prouve",25,f1c)},
    {key:"Fac 2",color:"#E65100",title:"Zone Héloïse — 5 eq.",floor:1,rooms:roomBlock("Salle du Conseil",90,f2a_conseil)+roomBlock("101 Marie Curie",30,f2a)+roomBlock("107 Charles Darwin",12,f2b)},
    {key:"Fac 3",color:"#7B1FA2",title:"Zone John-Edwin — 5 eq.",floor:1,rooms:roomBlock("Salle du Conseil",90,f3a_conseil)+roomBlock("112 Dorothy Vaughan",37,f3a)+roomBlock("104 Simone de Beauvoir",12,f3b)},
    {key:"Fac 4",color:"#2E7D32",title:"Zone Zeenat — 5 eq.",floor:2,rooms:roomBlock("Salle du Conseil",90,f4a_conseil)+roomBlock("207 Bobby Fisher",55,f4a)},
    {key:"Fac 5",color:"#00838F",title:"Zone Anne — 3 eq.",floor:2,rooms:roomBlock("205 Emile Galle",25,f5a)+roomBlock("202 Rosa Parks",20,f5b)}
  ];
  const filteredZones = isFacMode && currentFacKey ? zones.filter(z=>z.key===currentFacKey) : zones;
  const floor1 = filteredZones.filter(z=>z.floor===1);
  const floor2 = filteredZones.filter(z=>z.floor===2);
  const subtitle = isFacMode && currentFacKey
    ? `Tes salles — ${FAC_MAP[currentFacKey].fullName}`
    : "9 salles sur 2 etages. Tape ton nom pour trouver ta salle.";

  let roomsHtml = "";
  if(floor1.length) roomsHtml += `<div class="sec"><div class="sec-h">1er Etage<span class="bdg">${floor1.length} zone${floor1.length>1?"s":""}</span></div>${floor1.map(z=>facZone(z.color,z.key,z.title,z.rooms)).join("")}</div>`;
  if(floor2.length) roomsHtml += `<div class="sec"><div class="sec-h">2eme Etage<span class="bdg">${floor2.length} zone${floor2.length>1?"s":""}</span></div>${floor2.map(z=>facZone(z.color,z.key,z.title,z.rooms)).join("")}</div>`;

  return `<div class="pnl" id="p-phase1">
  <div style="background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border-radius:14px;padding:16px;margin-bottom:14px;">
    <h2 style="font-size:1.05em;color:#E65100;margin-bottom:6px;" data-fr="Ma salle" data-en="My room">Ma salle</h2>
    <p style="font-size:0.8em;color:#455A64;line-height:1.4;margin-bottom:12px;">${subtitle}</p>
    ${!isFacMode?`<input type="text" id="roomSearch" placeholder="&#128269; Chercher un nom ou une equipe..." style="width:100%;padding:12px 16px;border:2px solid #90CAF9;border-radius:12px;font-size:1em;outline:none;background:#fff;-webkit-appearance:none;" onfocus="this.style.borderColor='#1565C0'" onblur="this.style.borderColor='#90CAF9'">`:''}
  </div>
  ${roomsHtml}
  </div>`;
}

function buildPhase2(){
  let html = `<div class="pnl" id="p-phase2">
  <div style="background:linear-gradient(135deg,#F3E5F5,#E1BEE7);border-radius:14px;padding:16px;margin-bottom:14px;">
    <h2 style="font-size:1.05em;color:#7B1FA2;margin-bottom:6px;" data-fr="Mon village" data-en="My village">Mon village</h2>
    <p style="font-size:0.8em;color:#4A148C;line-height:1.4;" data-fr="5 villages, 5 couleurs. Apres le Sprint, ton equipe rejoint son village pour les pitchs." data-en="5 villages, 5 colors. After the Sprint, your team joins its village for the pitches.">5 villages, 5 couleurs. Apres le Sprint, ton equipe rejoint son village pour les pitchs.</p>
  </div>
  <div class="vg">`;
  const facVillages = isFacMode && currentFacKey ? [...new Set(getFacTeams().map(t=>t.village))] : null;
  for(const [vk,v] of Object.entries(VILLAGES)){
    if(facVillages && !facVillages.includes(vk)) continue;
    const vTeams = TEAMS.filter(t=>t.village===vk);
    const ppl = vTeams.reduce((s,t)=>s+t.members.length,0);
    html += `<div class="vc"><div class="vh" style="background:${v.color}"><h3>${v.name}</h3><div class="vi">${v.room}<br>${ppl} pers. / ${vTeams.length} eq.</div></div><div class="vb">`;
    vTeams.forEach(t => {
      let badge;
      if(t.p1Room===t.p2Room) badge=`<span class="sy">reste</span>`;
      else if(["Conseil"].includes(t.p1Room)&&["207","206"].includes(t.p2Room)) badge=`<span class="fl">${t.p1Room}&#8594;${t.p2Room}</span>`;
      else badge=`<span class="mv">${t.p1Room}&#8594;${t.p2Room}</span>`;
      html += `<div class="vt team-click" data-team="${t.name}" style="cursor:pointer"><span><strong>${t.name}</strong> (${t.members.length})</span>${badge}</div>`;
    });
    html += `</div></div>`;
  }
  html += `</div></div>`;
  return html;
}

function renderFacS3(){
  const container = document.getElementById("fac-s3-content");
  if(!container) return;
  let html = "";
  JM_PARTICIPANT_PHASES.forEach(ph=>{
    const responses = jmPhaseResponses[ph.id] || [];
    const total = responses.length;
    const counts = {};
    JM_LOCATIONS.forEach(l=>counts[l.id]=0);
    responses.forEach(r=>{if(counts[r.location]!==undefined) counts[r.location]++;});
    html += `<div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);">
      <h4 style="font-size:0.88em;color:#263238;margin-bottom:10px;">${currentLang==="en"?ph.en:ph.fr} <span style="font-size:0.75em;color:#607D8B;">(${ph.time})</span> <span style="font-size:0.72em;background:#E3F2FD;color:#1565C0;padding:2px 8px;border-radius:10px;margin-left:6px;">${total} vote${total>1?"s":""}</span></h4>`;
    if(total===0){
      html += `<div style="text-align:center;color:#B0BEC5;font-size:0.82em;padding:10px;">${currentLang==="en"?"No votes yet":"Aucun vote pour l'instant"}</div>`;
    } else {
      JM_LOCATIONS.forEach(loc=>{
        const c = counts[loc.id]||0;
        const pct = total>0 ? Math.round(c/total*100) : 0;
        html += `<div class="fac-dist-bar">
          <div class="fac-dist-label" style="color:${loc.color};">${currentLang==="en"?loc.name:loc.nameFr}</div>
          <div class="fac-dist-bar-bg">
            <div class="fac-dist-bar-fill" style="width:${pct}%;background:${loc.color};">${pct>10?pct+"%":""}</div>
          </div>
          <div class="fac-dist-count">${c} <span style="font-size:0.8em;color:#B0BEC5;">(${pct}%)</span></div>
        </div>`;
      });
    }
    html += `</div>`;
  });
  if(!html) html = `<div style="text-align:center;color:#607D8B;padding:20px;">${currentLang==="en"?"No data yet":"Pas encore de données"}</div>`;
  container.innerHTML = html;
}

function renderFacTeams(){
  const container = document.getElementById("facTeamsList");
  if(!container) return;
  const facName = document.getElementById("facSelect")?.value || localStorage.getItem("icn_fac_name") || "";
  if(!facName){ container.innerHTML = ""; return; }

  // Find which "Fac X" key maps to this name
  const facKey = Object.keys(FAC_MAP).find(k=>FAC_MAP[k].name===facName);
  if(!facKey){ container.innerHTML = `<p style="color:#C62828;font-size:0.85em;">Facilitateur non trouvé</p>`; return; }

  const myTeams = TEAMS.filter(t=>t.fac===facKey);
  const otherTeams = TEAMS.filter(t=>t.fac!==facKey);
  const activePhase = window._facActivePhase || null;

  function renderTeamCard(t, highlight){
    let cardHtml = `<div class="fac-team-card" ${!highlight?'style="opacity:0.85;"':''}>
      <div class="fac-team-hdr" style="background:${t.vColor};">
        <span>${t.name}</span>

      </div>
      <div class="fac-team-body" id="fac-team-${t.name.replace(/\s/g,'-')}">`;
    if(!activePhase){
      cardHtml += renderFacTeamSummary(t.name);
    } else {
      const voteKey = `icn_fac_${activePhase}_${t.name}`;
      const alreadyVoted = localStorage.getItem(voteKey);
      if(alreadyVoted){
        const loc = JM_LOCATIONS.find(l=>l.id===alreadyVoted);
        cardHtml += `<div class="fac-submitted">✅ ${loc ? (currentLang==="en"?loc.name:loc.nameFr) : alreadyVoted}</div>`;
      } else {
        const ts = t.name.replace(/\s/g,'-');
        cardHtml += `<div class="fac-jm-grid" id="fac-jm-grid-${ts}">
          ${JM_LOCATIONS.map(loc=>`<div class="fac-jm-btn" data-loc="${loc.id}" data-team="${t.name}" style="background:${loc.bg};color:${loc.color};" onclick="selectFacJmLoc('${ts}','${loc.id}')">${currentLang==="en"?loc.name:loc.nameFr}</div>`).join("")}
        </div>
        <div style="text-align:center;margin-top:6px;">
          <button id="fac-validate-${ts}" onclick="validateFacJmSelection('${t.name}','${ts}')" disabled style="background:#9E9E9E;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:0.8em;cursor:pointer;">Valider</button>
        </div>`;
      }
    }
    cardHtml += `</div></div>`;
    return cardHtml;
  }

  let html = `<div class="fac-team-group-label" data-fr="Mes équipes (${myTeams.length})" data-en="My teams (${myTeams.length})">${currentLang==="en"?"My teams":"Mes équipes"} (${myTeams.length})</div>`;
  myTeams.forEach(t=>{ html += renderTeamCard(t, true); });

  html += `<div class="fac-team-group-label other" data-fr="Autres équipes (${otherTeams.length})" data-en="Other teams (${otherTeams.length})">${currentLang==="en"?"Other teams":"Autres équipes"} (${otherTeams.length})</div>`;
  otherTeams.forEach(t=>{ html += renderTeamCard(t, false); });

  container.innerHTML = html;
}

function renderFacTeamSummary(teamName){
  let rows = "";
  JM_FAC_PHASES.forEach(ph=>{
    const voteKey = `icn_fac_${ph.id}_${teamName}`;
    const vote = localStorage.getItem(voteKey);
    if(vote){
      const loc = JM_LOCATIONS.find(l=>l.id===vote);
      if(loc){
        rows += `<div class="jm-summary-row">
          <div class="jm-summary-dot" style="background:${loc.color};"></div>
          <div class="jm-summary-phase">${ph.fr}</div>
          <div class="jm-summary-loc" style="color:${loc.color};font-weight:600;">${currentLang==="en"?loc.name:loc.nameFr}</div>
        </div>`;
      }
    }
  });
  if(!rows) return `<div style="font-size:0.78em;color:#999;text-align:center;padding:8px;">Aucun vote</div>`;
  return `<div class="jm-summary"><h4 style="font-size:0.78em;">Votes précédents</h4>${rows}</div>`;
}

const _facJmSelections = {};
function selectFacJmLoc(teamSlug, locId){
  _facJmSelections[teamSlug] = locId;
  const grid = document.getElementById("fac-jm-grid-"+teamSlug);
  if(grid){
    grid.querySelectorAll(".fac-jm-btn").forEach(el=>{
      const sel = el.dataset.loc === locId;
      el.style.transform = sel ? "scale(1.1)" : "scale(0.95)";
      el.style.opacity = sel ? "1" : "0.4";
      el.style.boxShadow = sel ? "0 0 0 3px "+el.style.color : "none";
    });
  }
  const btn = document.getElementById("fac-validate-"+teamSlug);
  if(btn){ btn.disabled = false; btn.style.background = "#1B5E20"; }
}
function validateFacJmSelection(teamName, teamSlug){
  const locId = _facJmSelections[teamSlug];
  if(!locId) return;
  submitFacJM(teamName, locId);
  delete _facJmSelections[teamSlug];
}

function submitFacJM(teamName, locId){
  if(!fbReady) return;
  const activePhase = window._facActivePhase;
  if(!activePhase) return alert("Aucune phase active");
  const facName = document.getElementById("facSelect")?.value || localStorage.getItem("icn_fac_name") || "unknown";

  fbDb.ref(`icn-polls/journey-map-facilitators/responses/${activePhase}/${teamName.replace(/\s/g,'_')}`).set({
    location: locId,
    facilitator: facName,
    timestamp: Date.now()
  }).then(()=>{
    localStorage.setItem(`icn_fac_${activePhase}_${teamName}`, locId);
    // Visual feedback
    const container = document.getElementById(`fac-team-${teamName.replace(/\s/g,'-')}`);
    if(container){
      const loc = JM_LOCATIONS.find(l=>l.id===locId);
      container.innerHTML = `<div class="fac-submitted">✅ ${loc ? (currentLang==="en"?loc.name:loc.nameFr) : locId}</div>`;
    }
  });
}

function selectChunks(query){
  const q = query.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const scores = [];
  for(const [key, chunk] of Object.entries(CHAT_CHUNKS)){
    let score = 0;
    for(const kw of chunk.kw){
      if(q.includes(kw)) score += kw.length * 2;
      else {
        const words = kw.split(" ");
        words.forEach(w => { if(w.length >= 3 && q.includes(w)) score += w.length; });
      }
    }
    if(score > 0) scores.push({key, score, text: chunk.text});
  }
  scores.sort((a,b) => b.score - a.score);
  // Toujours inclure contexte si rien de pertinent, sinon top 3 max
  if(scores.length === 0) return CHAT_CHUNKS.contexte.text + "\n" + CHAT_CHUNKS.programme_matin.text + "\n" + CHAT_CHUNKS.logistique.text;
  return scores.slice(0, 3).map(s => s.text).join("\n");
}

function localSearch(query){
  const q = query.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  // Search team
  const teamMatch = TEAMS.find(t=>t.name.toLowerCase()===q || t.name.toLowerCase().includes(q));
  if(teamMatch){
    const v = VILLAGES[teamMatch.village];
    return currentLang==="en"
      ? `<strong>Team ${teamMatch.name}</strong> (${teamMatch.members.length}p)<br>Phase 1: ${ROOM_NAMES[teamMatch.p1Room]}<br>Phase 2: ${v.name} — ${ROOM_NAMES[teamMatch.p2Room]}`
      : `<strong>Equipe ${teamMatch.name}</strong> (${teamMatch.members.length}p)<br>Phase 1 : ${ROOM_NAMES[teamMatch.p1Room]}<br>Phase 2 : ${v.name} — ${ROOM_NAMES[teamMatch.p2Room]}`;
  }
  // Search person — try full query first, then each word ≥3 chars
  let found = [];
  const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const searchWord = (w) => {
    let r = [];
    TEAMS.forEach(t=>{t.members.forEach(m=>{
      const fn = norm(m[0]), ln = norm(m[1]), full = fn+" "+ln;
      if(full.includes(w) || ln.includes(w) || fn.includes(w)){
        if(!r.find(x=>x.person[0]===m[0]&&x.person[1]===m[1])) r.push({person:m, team:t});
      }
    });});
    return r;
  };
  const STOP_WORDS = new Set(["est","une","des","les","que","qui","quoi","pour","dans","sur","par","avec","pas","mon","ton","son","nos","vos","leur","mais","donc","comment","pourquoi","quel","quelle","quels","quelles","cette","tout","tous","ici","bien","plus","aussi","comme","fait","etre","avoir","dire","faire","aller","voir","venir","peut","doit","faut","suis","sont","sera","salle","equipe","phase","village","sprint","design","pitch","canvas","vote","fiche","exercice","atelier","programme","agenda","horaire","pause","cafe","wifi","train","dejeuner","matin","midi","apres","question","the","and","for","what","how","why","who","where","when","which","this","that","with","from","your","team","room","floor"]);
  found = searchWord(q);
  // If no match on full query, try each word ≥4 chars, skip stop words
  if(found.length===0){
    const words = q.split(/[\s,;.!?']+/).filter(w=>w.length>=4 && !STOP_WORDS.has(w));
    for(const w of words){
      const r = searchWord(w);
      if(r.length>0 && r.length<=10){found=r;break;}
    }
  }
  if(found.length===1){
    const {person:m, team:t} = found[0];
    const v = VILLAGES[t.village];
    return currentLang==="en"
      ? `<strong>${m[0]} ${m[1]}</strong><br>Team: <strong>${t.name}</strong><br>Phase 1: ${ROOM_NAMES[t.p1Room]}<br>Phase 2: ${v.name} — ${ROOM_NAMES[t.p2Room]}`
      : `<strong>${m[0]} ${m[1]}</strong><br>Equipe : <strong>${t.name}</strong><br>Phase 1 : ${ROOM_NAMES[t.p1Room]}<br>Phase 2 : ${v.name} — ${ROOM_NAMES[t.p2Room]}`;
  }
  if(found.length>1){
    const header = currentLang==="en"
      ? `I found ${found.length} people. Can you be more specific? 😊`
      : `J'ai trouvé ${found.length} personnes. Tu peux préciser ? 😊`;
    return header + "<br><br>" + found.map(f=>`• <strong>${f.person[0]} ${f.person[1]}</strong> → equipe ${f.team.name}`).join("<br>");
  }
  return null;
}

async function askLLM(query){
  const langInstruction = currentLang==="en" ? "IMPORTANT: Answer in ENGLISH only." : "IMPORTANT: Reponds en FRANCAIS uniquement.";
  const relevantContext = selectChunks(query);
  const sysPrompt = CHAT_SYSTEM + "\n" + langInstruction + "\n\nCONTEXTE PERTINENT:\n" + relevantContext;
  try{
    const res = await fetch(CHAT_PROXY_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system: sysPrompt,
        messages:[{role:"user",content:query}]
      })
    });
    if(!res.ok){
      console.error("LLM proxy error:",res.status,res.statusText);
      return null;
    }
    const data = await res.json();
    console.log("LLM response:",JSON.stringify(data).substring(0,200));
    if(data.content && data.content[0]){
      return data.content[0].text.replace(/\n/g,"<br>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/##\s*([^\n<]+)/g,"<strong>$1</strong>");
    }
    if(data.error){console.error("LLM API error:",data.error.message);}
    return null;
  }catch(e){console.error("LLM fetch error:",e);return null;}
}

function sendChat(){
  const input = document.getElementById("chatIn");
  const q = input.value.trim();
  if(!q) return;
  const msgs = document.getElementById("chatMsgs");
  msgs.innerHTML += `<div class="chat-msg user">${escHtml(q)}</div>`;
  input.value = "";

  // Try local search first (names, teams)
  const local = localSearch(q);
  if(local){
    msgs.innerHTML += `<div class="chat-msg bot">${local}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }

  // Otherwise use Claude LLM
  const loadingId = "loading-"+Date.now();
  msgs.innerHTML += `<div class="chat-msg bot" id="${loadingId}"><em>${currentLang==="en"?"Thinking...":"Je reflechis..."}</em></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  askLLM(q).then(answer=>{
    const el = document.getElementById(loadingId);
    if(el){
      if(answer){
        el.innerHTML = answer;
      } else {
        el.innerHTML = currentLang==="en"
          ? "Sorry, I couldn't answer that. Try asking about the schedule, exercises, wifi, or type a name to find your team."
          : "Désolé, je n'ai pas pu repondre. Essaie de demander le programme, les exercices, le wifi, ou tape un nom pour trouver ton equipe.";
      }
    }
    msgs.scrollTop = msgs.scrollHeight;
  });
}

  {id:"doubt",name:"Harbour of Doubt",nameFr:"Le doute",color:"#5C6BC0",bg:"#EDE7F6",keywords:["doute","incertitude","hesitation","confusion","doubt","unclear","uncertain"]},

function classifyResponse(text){
  const t = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const scores = {};
  JM_LOCATIONS.forEach(loc=>{
    scores[loc.id] = 0;
    loc.keywords.forEach(kw=>{
      if(t.includes(kw)) scores[loc.id] += 1;
    });
  });
  const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  return best[1] > 0 ? best[0] : "doubt"; // default
}

function submitPoll(qid){
  if(!fbReady) return;
  const input = document.getElementById("poll-input-"+qid);
  const text = input.value.trim();
  if(!text) return;
  // Check max words for wordcloud questions
  const qDef = POLL_QUESTIONS.find(q=>q.id===qid);
  if(qDef && qDef.maxWords){
    const wordCount = text.split(/\s+/).filter(w=>w.length>0).length;
    if(wordCount > qDef.maxWords){
      alert(currentLang==="en" ? `Maximum ${qDef.maxWords} words!` : `Maximum ${qDef.maxWords} mots !`);
      return;
    }
  }
  const uid = localStorage.getItem("icn_uid") || (()=>{const id="u_"+Math.random().toString(36).slice(2,10);localStorage.setItem("icn_uid",id);return id;})();
  const btn = document.getElementById("poll-send-"+qid);
  btn.disabled = true;
  btn.textContent = "...";
  fbDb.ref("icn-polls/responses/"+qid).push({
    text: text, uid: uid, ts: Date.now()
  }).then(()=>{
    input.value = "";
    btn.disabled = false;
    updateCharCount(qid, parseInt(input.getAttribute("maxlength")));
    btn.style.background = "#2E7D32";
    btn.textContent = currentLang==="fr" ? "Envoyé !" : "Sent!";
    // Q1 et Q2: réponses multiples autorisées tant que le sondage est actif
    // Q3 (journeymap): une seule réponse par phase
    if(qid !== "q1" && qid !== "q2") localStorage.setItem("icn_voted_"+qid, "1");
    setTimeout(()=>{
      btn.style.background = "";
      btn.textContent = currentLang==="fr" ? "Envoyer" : "Submit";
    }, 1500);
  }).catch(err=>{
    btn.disabled = false;
    btn.textContent = currentLang==="fr" ? "Envoyer" : "Submit";
  });
}

function autoAdvancePoll(currentQid){
  const idx = POLL_QUESTIONS.findIndex(q=>q.id===currentQid);
  if(idx < POLL_QUESTIONS.length - 1){
    const nextQ = POLL_QUESTIONS[idx+1];
    const nextEl = document.getElementById("poll-"+nextQ.id);
    if(nextEl){
      const curEl = document.getElementById("poll-"+currentQid);
      if(curEl) curEl.classList.remove("active");
      nextEl.classList.add("active");
      nextEl.scrollIntoView({behavior:"smooth",block:"start"});
      updateWaitingScreen();
    }
  } else {
    // After last question, show thank you
    const curEl = document.getElementById("poll-"+currentQid);
    if(curEl) curEl.classList.remove("active");
    showThankYouScreen();
  }
}

function listenPolls(){
  if(!fbReady) return;
  POLL_QUESTIONS.forEach(q=>{
    if(q.type==="journeymap"){
      // q3 journey map: active state now handled by listenJmPhases
      // Still listen to old q3 active for backwards compat
      fbDb.ref("icn-polls/active/"+q.id).on("value", snap=>{
        const active = snap.val() === true;
        // The q3 poll visibility is now driven by JM active-phase
        // But keep admin status indicator in sync
        const st = document.getElementById("adm-st-"+q.id);
        if(st){st.classList.toggle("on",active);st.classList.toggle("off",!active);}
        updateWaitingScreen();
      });
      // Don't listen to old q3 responses — multi-phase handles it
      return;
    }
    // Listen responses for non-JM questions
    fbDb.ref("icn-polls/responses/"+q.id).on("value", snap=>{
      const data = snap.val();
      const responses = data ? Object.values(data) : [];
      pollCache[q.id] = responses;
      const countEl = document.getElementById("poll-count-"+q.id);
      if(countEl) countEl.textContent = responses.length + " réponse" + (responses.length>1?"s":"");
      renderPollResults(q, responses);
      // Also update admin results view
      const admC = document.getElementById("adm-results-"+q.id);
      if(admC){
        if(q.type==="wordcloud") renderWordCloud(admC, responses);
        else renderOpenText(admC, responses);
      }
      // Also update facilitator view
      const facC = document.getElementById("fac-results-"+q.id);
      if(facC){
        if(q.type==="wordcloud") renderWordCloud(facC, responses);
        else renderOpenText(facC, responses);
      }
      const facCount = document.getElementById("fac-count-"+q.id);
      if(facCount) facCount.textContent = responses.length + " réponse" + (responses.length>1?"s":"");
    });
    // Listen active state
    fbDb.ref("icn-polls/active/"+q.id).on("value", snap=>{
      const active = snap.val() === true;
      const isAdmin = window.location.search.includes("admin");
      // Update source of truth
      _pollStates[q.id] = active;
      // Update admin status indicator
      const st = document.getElementById("adm-st-"+q.id);
      if(st){st.classList.toggle("on",active);st.classList.toggle("off",!active);}
      // Non-admin: clear results display when question is deactivated
      if(!active && !isAdmin){
        const rc = document.getElementById("poll-results-"+q.id);
        if(rc) rc.innerHTML = "";
        const cc = document.getElementById("poll-count-"+q.id);
        if(cc) cc.textContent = "";
      }
      // Enforce single poll visibility + waiting screen
      updateWaitingScreen();
    });
  });
  // Start multi-phase JM listeners
  listenJmPhases();
}

// Track Firebase active states directly (source of truth)
const _pollStates = {q1:false, q2:false};

function updateWaitingScreen(){
  const waiting = document.getElementById("pollWaiting");
  if(!waiting) return;
  const isAdmin = window.location.search.includes("admin");
  const jmActive = !!window._jmActivePhase;
  const anyRegularActive = _pollStates.q1 || _pollStates.q2;

  // First: set all poll elements visibility
  POLL_QUESTIONS.forEach(q=>{
    const el = document.getElementById("poll-"+q.id);
    if(!el) return;
    if(q.type==="journeymap"){
      if(isAdmin){
        el.classList.toggle("active", jmActive);
      } else {
        // Non-admin: show q3 ONLY if JM active AND no regular poll active
        el.classList.toggle("active", jmActive && !anyRegularActive);
      }
    } else {
      if(isAdmin){
        el.classList.toggle("active", _pollStates[q.id]);
      } else {
        // Non-admin: show only the active regular poll, hide if JM takes priority
        el.classList.toggle("active", _pollStates[q.id]);
        // If another regular poll is active, hide this one
        if(!isAdmin && _pollStates[q.id]){
          POLL_QUESTIONS.filter(oq=>oq.id!==q.id && oq.type!=="journeymap").forEach(oq=>{
            const oel = document.getElementById("poll-"+oq.id);
            if(oel) oel.classList.remove("active");
          });
        }
      }
    }
  });

  // Then: waiting screen — hide if ANY poll is showing
  const anyVisible = anyRegularActive || (jmActive && (isAdmin || !anyRegularActive));
  const isPresenter = document.body.classList.contains("presenter");
  if(anyVisible){
    waiting.style.setProperty("display", "none", "important");
  } else {
    waiting.style.setProperty("display", isPresenter ? "flex" : "", "important");
  }
}

function enforceSinglePoll(){

function renderPollResults(q, responses){
  const c = document.getElementById("poll-results-"+q.id);
  if(!c) return;
  if(q.type === "wordcloud") renderWordCloud(c, responses);
  else renderOpenText(c, responses);
}

function renderWordCloud(container, responses){
  const counts = {};
  responses.forEach(r=>{
    const expr = r.text.toLowerCase().trim().replace(/[;.!?]/g,"").trim();
    if(expr.length > 0) counts[expr] = (counts[expr]||0) + 1;
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,50);
  if(!sorted.length){container.innerHTML="";return;}
  const maxC = sorted[0][1];
  const colors = ["#1565C0","#E65100","#7B1FA2","#2E7D32","#C2185B","#00838F","#F57F17","#455A64","#E53935","#00695C"];
  container.innerHTML = `<div class="wc-box">${sorted.map(([w,c],i)=>{
    const sz = 0.7 + (c/maxC)*1.8;
    const col = colors[i%colors.length];
    return `<span class="wc-word" style="font-size:${sz}em;color:${col};background:${col}15;">${w}<sup style="font-size:0.5em;opacity:.5;">${c}</sup></span>`;
  }).join("")}</div>`;
}

function renderOpenText(container, responses){
  const items = responses.slice(-200).reverse();
  const postItColors = ["#FFF9C4","#FFECB3","#FFE0B2","#F8BBD0","#E1BEE7","#C8E6C9","#B3E5FC","#DCEDC8","#FFE082","#B2EBF2"];
  container.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px;">${items.map((r,i)=>{
    const bg = postItColors[i % postItColors.length];
    const rot = (Math.random()*6-3).toFixed(1);
    return `<div style="background:${bg};padding:14px 16px;border-radius:4px;box-shadow:2px 3px 8px rgba(0,0,0,.12);min-width:120px;max-width:220px;flex:1 1 180px;transform:rotate(${rot}deg);font-size:0.85em;line-height:1.4;word-break:break-word;border-bottom:3px solid rgba(0,0,0,.06);">${escHtml(r.text)}</div>`;
  }).join("")}</div>`;
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function updateJmParticipantView(){
  const phase = window._jmActivePhase;
  const selectGrid = document.getElementById("jmSelect");
  const votedDiv = document.getElementById("jm-already-voted");
  const instruction = document.getElementById("jmInstruction");
  const phaseLabel = document.getElementById("jm-active-phase-label");
  const summaryContainer = document.getElementById("jm-summary-container");

  if(!phase){
    // No active phase — show summary of previous votes
    if(selectGrid) selectGrid.style.display = "none";
    if(votedDiv) votedDiv.style.display = "none";
    if(instruction) instruction.style.display = "none";
    if(phaseLabel) phaseLabel.style.display = "none";
    // Build summary
    if(summaryContainer){
      let rows = "";
      JM_PARTICIPANT_PHASES.forEach(ph=>{
        const vote = localStorage.getItem(`icn_jm_${ph.id}_voted`);
        if(vote){
          const loc = JM_LOCATIONS.find(l=>l.id===vote);
          if(loc){
            rows += `<div class="jm-summary-row">
              <div class="jm-summary-dot" style="background:${loc.color};"></div>
              <div class="jm-summary-phase">${ph.fr} (${ph.time})</div>
              <div class="jm-summary-loc" style="color:${loc.color};font-weight:600;">${currentLang==="en"?loc.name:loc.nameFr}</div>
            </div>`;
          }
        }
      });
      if(rows){
        summaryContainer.innerHTML = `<div class="jm-summary"><h4 data-fr="Ton parcours" data-en="Your journey">${currentLang==="en"?"Your journey":"Ton parcours"}</h4>${rows}</div>`;
      } else {
        summaryContainer.innerHTML = "";
      }
    }
    return;
  }

  // Active phase
  if(summaryContainer) summaryContainer.innerHTML = "";
  const phaseObj = JM_PARTICIPANT_PHASES.find(p=>p.id===phase);
  if(phaseLabel && phaseObj){
    phaseLabel.style.display = "";
    phaseLabel.innerHTML = `${currentLang==="en"?phaseObj.en:phaseObj.fr} <span class="jm-phase-badge">${phaseObj.time}</span>`;
  }

  const voteKey = `icn_jm_${phase}_voted`;
  if(localStorage.getItem(voteKey)){
    // Already voted
    if(selectGrid) selectGrid.style.display = "none";
    if(votedDiv) votedDiv.style.display = "";
    if(instruction) instruction.style.display = "none";
  } else {
    if(selectGrid) selectGrid.style.display = "";
    if(votedDiv) votedDiv.style.display = "none";
    if(instruction) instruction.style.display = "";
  }
}

function updateJourneyMap(responses){
  const grid = document.getElementById("jmGrid");
  const box = document.getElementById("jmBox");
  if(!grid) return;
  if(!responses || !responses.length){
    grid.innerHTML = JM_LOCATIONS.map(loc=>`<div class="jm-loc" style="background:${loc.bg};border:2px solid ${loc.color}20;">
      <div class="jm-n" style="color:${loc.color};" data-fr="${loc.nameFr}" data-en="${loc.name}">${currentLang==="en"?loc.name:loc.nameFr}</div>
      <div class="jm-c" style="color:${loc.color};">—</div>
    </div>`).join("");
    return;
  }
  if(box) box.classList.add("visible");
  const locCounts = {};
  JM_LOCATIONS.forEach(l=>locCounts[l.id]=0);
  responses.forEach(r=>{
    const loc = JM_LOCATIONS.find(l=>l.id===r.text);
    if(loc) locCounts[loc.id]++;
    else locCounts[classifyResponse(r.text)]++;
  });
  // Keep original order (journey progression), don't sort
  grid.innerHTML = JM_LOCATIONS.map(loc=>{
    const count = locCounts[loc.id]||0;
    return `<div class="jm-loc" style="background:${loc.bg};border:2px solid ${loc.color}${count>0?'50':'15'};">
      <div class="jm-n" style="color:${loc.color};" data-fr="${loc.nameFr}" data-en="${loc.name}">${currentLang==="en"?loc.name:loc.nameFr}</div>
      <div class="jm-c" style="color:${loc.color};">${count||"—"}</div>
    </div>`;
  }).join("");
}

// Admin
function pollAdmin(action, target){
  if(!fbReady) return;
  if(action==="activate"){
    // Only one question at a time
    POLL_QUESTIONS.forEach(q=>{
      fbDb.ref("icn-polls/active/"+q.id).set(q.id===target);
    });
    // If activating q3, also activate first available JM participant phase
    if(target==="q3"){
      const nextPhase = JM_PARTICIPANT_PHASES.find(ph=>!localStorage.getItem(`icn_jm_${ph.id}_done`)) || JM_PARTICIPANT_PHASES[0];
      fbDb.ref("icn-polls/journey-map/active-phase").set(nextPhase.id);
    }
  } else if(action==="deactivate"){
    if(target==="all"){
      POLL_QUESTIONS.forEach(q=>fbDb.ref("icn-polls/active/"+q.id).set(false));
      fbDb.ref("icn-polls/journey-map/active-phase").set(null);
    }
    else {
      fbDb.ref("icn-polls/active/"+target).set(false);
      if(target==="q3") fbDb.ref("icn-polls/journey-map/active-phase").set(null);
    }
  } else if(action==="reset"){
    const msg = target==="all" ? "Supprimer TOUTES les réponses ?" : "Supprimer les réponses de Q"+target.replace("q","")+" ?";
    if(confirm(msg)){
      if(target==="all"){
        fbDb.ref("icn-polls/responses").remove();
        POLL_QUESTIONS.forEach(q=>localStorage.removeItem("icn_voted_"+q.id));
      } else {
        fbDb.ref("icn-polls/responses/"+target).remove();
        localStorage.removeItem("icn_voted_"+target);
      }
      // Stay on admin page, just clear the displayed results
      const resEl = document.getElementById("adm-results-"+target);
      if(resEl) resEl.innerHTML = "";
      const countEl = document.getElementById("poll-count-"+target);
      if(countEl) countEl.textContent = "0 réponse";
    }
  }
}

function jmPhaseAdmin(action, phaseId, phaseType){
  if(!fbReady) return;
  const basePath = phaseType==="facilitator" ? "icn-polls/journey-map-facilitators" : "icn-polls/journey-map";

  if(action==="activate"){

      fbDb.ref(`${basePath}/responses/${phaseId}`).remove();

      if(phaseType==="participant"){

      } else {
        TEAMS.forEach(t=>localStorage.removeItem(`icn_fac_${phaseId}_${t.name}`));
      }
    }
  }
}

function listenJmPhases(){
  if(!fbReady) return;

  // --- Participant phases ---
  fbDb.ref("icn-polls/journey-map/active-phase").on("value", snap=>{
    const phase = snap.val() || null;
    window._jmActivePhase = phase;
    // Update admin badges
    JM_PARTICIPANT_PHASES.forEach(ph=>{
      const badge = document.getElementById(`adm-jm-badge-${ph.id}`);
      if(badge){
        badge.classList.toggle("active", ph.id===phase);
        badge.style.background = ph.id===phase ? "#4CAF50" : "#616161";
      }
    });
    // Update participant view — do NOT directly toggle q3 active here,
    // let enforceSinglePoll() handle visibility to avoid race conditions
    updateJmParticipantView();
    enforceSinglePoll();
    // Show jmBox when any phase has data
    const jmBox = document.getElementById("jmBox");
    if(jmBox){
      const hasData = Object.values(jmPhaseResponses).some(arr=>arr&&arr.length>0);
      jmBox.classList.toggle("visible", !!phase || hasData);
    }
  });

  // Listen to each participant phase responses
  JM_PARTICIPANT_PHASES.forEach(ph=>{
    fbDb.ref(`icn-polls/journey-map/responses/${ph.id}`).on("value", snap=>{
      const data = snap.val();
      const responses = data ? Object.values(data) : [];
      jmPhaseResponses[ph.id] = responses;
      // Update admin count
      const countEl = document.getElementById(`adm-jm-count-${ph.id}`);
      if(countEl) countEl.textContent = responses.length;
      // Update heatmap, evolution, money shot
      updateJmAdminHeatmap();
      updateJmEvolution();
      // Update the live results grid (aggregate all participant phases for display)
      updateJourneyMapAggregate();
      // Update facilitator S3 view
      renderFacS3();
      // Update q3 poll count
      const totalResponses = JM_PARTICIPANT_PHASES.reduce((s,p)=>{
        return s + (jmPhaseResponses[p.id]||[]).length;
      }, 0);
      const pollCount = document.getElementById("poll-count-q3");
      if(pollCount) pollCount.textContent = totalResponses + " réponse" + (totalResponses>1?"s":"");
    });
  });

  // --- Facilitator phases ---
  fbDb.ref("icn-polls/journey-map-facilitators/active-phase").on("value", snap=>{
    const phase = snap.val() || null;
    window._facActivePhase = phase;
    // Update admin badges
    JM_FAC_PHASES.forEach(ph=>{
      const badge = document.getElementById(`adm-jm-badge-${ph.id}`);
      if(badge){
        badge.classList.toggle("active", ph.id===phase);
        badge.style.background = ph.id===phase ? "#4CAF50" : "#616161";
      }
    });
    // Update facilitator tab
    const phaseInfo = document.getElementById("facPhaseInfo");
    if(phaseInfo){
      if(phase){
        const phObj = JM_FAC_PHASES.find(p=>p.id===phase);
        phaseInfo.className = "fac-phase-info";
        phaseInfo.innerHTML = `<div class="fac-phase-dot"></div> Phase active : <strong>${phObj?phObj.fr:phase}</strong> (${phObj?phObj.time:""})`;
      } else {
        phaseInfo.className = "fac-no-phase";
        phaseInfo.textContent = currentLang==="en" ? "No active phase" : "Aucune phase active";
      }
    }
    renderFacTeams();
  });

  // Listen to each facilitator phase responses
  JM_FAC_PHASES.forEach(ph=>{
    fbDb.ref(`icn-polls/journey-map-facilitators/responses/${ph.id}`).on("value", snap=>{
      const data = snap.val();
      jmFacPhaseResponses[ph.id] = data || {};
      // Update admin count
      const countEl = document.getElementById(`adm-jm-count-${ph.id}`);
      if(countEl) countEl.textContent = Object.keys(jmFacPhaseResponses[ph.id]).length;
      // Update facilitator heatmap + global view
      updateJmFacHeatmap();
      renderFacGlobalView();
    });
  });
}

function updateJourneyMapAggregate(){
  // Show the most recent active phase's data in the live results grid
  const grid = document.getElementById("jmGrid");
  const box = document.getElementById("jmBox");
  if(!grid) return;

  // Aggregate: show the active phase data, or most recent phase with data
  let displayPhase = window._jmActivePhase;
  if(!displayPhase){
    // Find most recent phase with data
    for(let i=JM_PARTICIPANT_PHASES.length-1;i>=0;i--){
      if((jmPhaseResponses[JM_PARTICIPANT_PHASES[i].id]||[]).length>0){
        displayPhase = JM_PARTICIPANT_PHASES[i].id;
        break;
      }
    }
  }
  if(!displayPhase){
    grid.innerHTML = JM_LOCATIONS.map(loc=>`<div class="jm-loc" style="background:${loc.bg};border:2px solid ${loc.color}20;">
      <div class="jm-n" style="color:${loc.color};" data-fr="${loc.nameFr}" data-en="${loc.name}">${currentLang==="en"?loc.name:loc.nameFr}</div>
      <div class="jm-c" style="color:${loc.color};">—</div>
    </div>`).join("");
    return;
  }
  if(box) box.classList.add("visible");
  const responses = jmPhaseResponses[displayPhase] || [];
  const locCounts = {};
  JM_LOCATIONS.forEach(l=>locCounts[l.id]=0);
  responses.forEach(r=>{
    if(locCounts[r.location]!==undefined) locCounts[r.location]++;
  });
  const phObj = JM_PARTICIPANT_PHASES.find(p=>p.id===displayPhase);
  grid.innerHTML = JM_LOCATIONS.map(loc=>{
    const count = locCounts[loc.id]||0;
    return `<div class="jm-loc" style="background:${loc.bg};border:2px solid ${loc.color}${count>0?'50':'15'};">
      <div class="jm-n" style="color:${loc.color};" data-fr="${loc.nameFr}" data-en="${loc.name}">${currentLang==="en"?loc.name:loc.nameFr}</div>
      <div class="jm-c" style="color:${loc.color};">${count||"—"}</div>
      ${phObj?`<div class="jm-l" style="color:${loc.color};">${phObj.fr}</div>`:""}
    </div>`;
  }).join("");
}

function updateJmAdminHeatmap(){
  const tbody = document.getElementById("jmHeatmapBody");
  if(!tbody) return;
  let html = "";
  JM_PARTICIPANT_PHASES.forEach(ph=>{
    const responses = jmPhaseResponses[ph.id] || [];
    const total = responses.length;
    const counts = {};
    JM_LOCATIONS.forEach(l=>counts[l.id]=0);
    responses.forEach(r=>{if(counts[r.location]!==undefined) counts[r.location]++;});
    html += `<tr><td class="hm-label">${ph.fr} (${ph.time})</td>`;
    JM_LOCATIONS.forEach(loc=>{
      const c = counts[loc.id]||0;
      const pct = total>0 ? Math.round(c/total*100) : 0;
      const opacity = total>0 ? Math.max(0.15, c/total) : 0.1;
      html += `<td style="background:${loc.color}${Math.round(opacity*255).toString(16).padStart(2,'0')};">${c}<br><span style="font-size:0.8em;opacity:.7;">${pct}%</span></td>`;
    });
    html += `<td style="background:#455A64;">${total}</td></tr>`;
  });
  tbody.innerHTML = html;
}

function updateJmEvolution(){
  const container = document.getElementById("jmEvolution");
  const msContainer = document.getElementById("jmMoneyShot");
  if(!container) return;
  let html = "";
  const locColors = {};
  JM_LOCATIONS.forEach(l=>locColors[l.id]=l.color);
  const locIndex = {};
  JM_LOCATIONS.forEach((l,i)=>locIndex[l.id]=i);

  JM_PARTICIPANT_PHASES.forEach(ph=>{
    const responses = jmPhaseResponses[ph.id] || [];
    const total = responses.length || 1;
    const counts = {};
    JM_LOCATIONS.forEach(l=>counts[l.id]=0);
    responses.forEach(r=>{if(counts[r.location]!==undefined) counts[r.location]++;});
    html += `<div class="evo-row"><div class="evo-label">${ph.fr}</div><div class="evo-bar-container">`;
    JM_LOCATIONS.forEach(loc=>{
      const pct = Math.round((counts[loc.id]||0)/total*100);
      if(pct>0) html += `<div class="evo-bar-seg" style="width:${pct}%;background:${loc.color};">${pct>8?pct+"%":""}</div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;

  // Money shot: compare first and last participant phase
  if(msContainer){
    const first = jmPhaseResponses[JM_PARTICIPANT_PHASES[0]?.id] || [];
    const last = jmPhaseResponses[JM_PARTICIPANT_PHASES[JM_PARTICIPANT_PHASES.length-1]?.id] || [];
    if(first.length>0 && last.length>0){
      // Average position
      const avgFirst = first.reduce((s,r)=>(s+(locIndex[r.location]||0)),0)/first.length;
      const avgLast = last.reduce((s,r)=>(s+(locIndex[r.location]||0)),0)/last.length;
      // Count advanced
      // Can't track individuals across phases, so compare distributions
      // "X% ont avancé" = % of last phase responses that are further than the first phase median
      const medianFirst = avgFirst;
      const advanced = last.filter(r=>(locIndex[r.location]||0) > medianFirst).length;
      const pct = Math.round(advanced/last.length*100);
      msContainer.style.display = "";
      document.getElementById("jmMsNumber").textContent = pct + "%";
      document.getElementById("jmMsLabel").textContent = "ont avancé d'au moins une étape";
    } else {
      msContainer.style.display = "none";
    }
  }
}

function updateJmFacHeatmap(){
  const tbody = document.getElementById("jmFacHeatmapBody");
  if(!tbody) return;
  let html = "";
  JM_FAC_PHASES.forEach(ph=>{
    const data = jmFacPhaseResponses[ph.id] || {};
    const entries = Object.values(data);
    const total = entries.length;
    const counts = {};
    JM_LOCATIONS.forEach(l=>counts[l.id]=0);
    entries.forEach(r=>{if(r.location && counts[r.location]!==undefined) counts[r.location]++;});
    html += `<tr><td class="hm-label">${ph.fr} (${ph.time})</td>`;
    JM_LOCATIONS.forEach(loc=>{
      const c = counts[loc.id]||0;
      const pct = total>0 ? Math.round(c/total*100) : 0;
      const opacity = total>0 ? Math.max(0.15, c/total) : 0.1;
      html += `<td style="background:${loc.color}${Math.round(opacity*255).toString(16).padStart(2,'0')};">${c}<br><span style="font-size:0.8em;opacity:.7;">${pct}%</span></td>`;
    });
    html += `<td style="background:#455A64;">${total}</td></tr>`;
  });
  tbody.innerHTML = html;
}

// Export to Excel (CSV download)
function exportPollSingle(qid){
  if(!fbReady) return;
  if(qid==="jm-participants"){ exportJourneyMap(); return; }
  if(qid==="jm-facilitateurs"){ exportFacilitators(); return; }
  fbDb.ref("icn-polls/responses/"+qid).once("value", snap=>{

    if(!data) return alert("Aucune réponse");
    const label = qid==="q1" ? "Quotidien" : "Freins_ICN";
    const rows = Object.values(data).map(r=>[r.text||'']);
    dlXLSX(rows, "Sondage_"+label, ["Réponse"]);
  });
}

// SheetJS for real .xlsx exports — loaded early
let _xlsxReady = false;
(function(){
  const s = document.createElement("script");
  s.src = "https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";
  s.onload = ()=>{ _xlsxReady = true; console.log("SheetJS loaded"); };
  document.head.appendChild(s);
})();

function dlXLSX(rows, name, headers){
  if(!_xlsxReady || typeof XLSX === "undefined"){
    alert("Excel pas encore chargé. Réessaie dans 2 secondes.");
    return;
  }
  try{
    const ws = XLSX.utils.aoa_to_sheet(headers ? [headers, ...rows] : rows);
    const colW = (headers||rows[0]||[]).map((_,i)=>{
      let max = headers ? (headers[i]||'').length : 0;
      rows.forEach(r=>{ if(r[i]) max = Math.max(max, String(r[i]).length); });
      return {wch: Math.min(Math.max(max+2, 10), 60)};
    });
    ws['!cols'] = colW;
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, name.substring(0,31));
    XLSX.writeFile(wb, "ICN_"+name+"_"+new Date().toISOString().slice(0,10)+".xlsx");
  }catch(e){
    console.error("Excel export error:", e);
    alert("Erreur export: " + e.message);
  }
}

function exportJourneyMap(){
  if(!fbReady) return;
  fbDb.ref("icn-polls/journey-map/responses").once("value", snap=>{
    const data = snap.val() || {};
    const rows = [];
    JM_PARTICIPANT_PHASES.forEach(ph=>{
      const phData = data[ph.id] ? Object.values(data[ph.id]) : [];
      phData.forEach(r=>{
        const loc = JM_LOCATIONS.find(l=>l.id===r.location);
        rows.push([ph.labelFr, loc?loc.nameFr:r.location]);
      });
    });
    if(!rows.length) return alert("Aucune réponse Journey Map");
    dlXLSX(rows, "JourneyMap_Participants", ["Phase","Étape choisie"]);
  });
}
function exportFacilitators(){
  if(!fbReady) return;
  fbDb.ref("icn-polls/journey-map-facilitators/responses").once("value", snap=>{
    const data = snap.val() || {};
    const rows = [];
    JM_FAC_PHASES.forEach(ph=>{
      const phData = data[ph.id] || {};
      Object.entries(phData).forEach(([team, r])=>{
        const loc = JM_LOCATIONS.find(l=>l.id===r.location);
        rows.push([ph.labelFr, team.replace(/_/g,' '), r.facilitator||'', loc?loc.nameFr:r.location]);
      });
    });
    if(!rows.length) return alert("Aucune évaluation facilitateur");
    dlXLSX(rows, "JourneyMap_Facilitateurs", ["Phase","Équipe","Facilitateur","Étape"]);
  });
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("icn_lang", lang);
  document.getElementById("langFr").style.background = lang==="fr" ? "rgba(255,255,255,.9)" : "transparent";
  document.getElementById("langFr").style.color = lang==="fr" ? "#0D47A1" : "rgba(255,255,255,.7)";
  document.getElementById("langEn").style.background = lang==="en" ? "rgba(255,255,255,.9)" : "transparent";
  document.getElementById("langEn").style.color = lang==="en" ? "#0D47A1" : "rgba(255,255,255,.7)";
  document.querySelectorAll("[data-"+lang+"]").forEach(el=>{
    el.textContent = el.dataset[lang];
  });
  // Update tab labels
  document.querySelectorAll(".tb").forEach(tb=>{
    if(tb.dataset[lang]) tb.textContent = tb.dataset[lang];
  });
  // Update fac sub-tab labels
  document.querySelectorAll(".fac-tab").forEach(ft=>{
    if(ft.dataset[lang]) ft.textContent = ft.dataset[lang];
  });
  // Update chatbot button
  document.getElementById("chatBtn").innerHTML = lang==="fr" ? "&#128269; Mon assistant" : "&#128269; My assistant";
  // Update chat header
  const chatHdrSpan = document.querySelector(".chat-hdr span:first-child");
  if(chatHdrSpan) chatHdrSpan.textContent = lang==="fr" ? "Mon assistant" : "My assistant";
  // Update chat welcome message
  const firstMsg = document.querySelector("#chatMsgs .chat-msg.bot");
  if(firstMsg && document.querySelectorAll("#chatMsgs .chat-msg").length <= 1){
    firstMsg.innerHTML = lang==="fr"
      ? 'Bonjour ! Tape ton <strong>nom</strong>, un <strong>nom d\'equipe</strong>, ou un sujet (<em>programme, wifi, déjeuner, méthode...</em>).'
      : 'Hello! Type your <strong>name</strong>, a <strong>team name</strong>, or a topic (<em>schedule, wifi, lunch, method...</em>).';

  // Update chat placeholder
  const ci = document.getElementById("chatIn");
  if(ci) ci.placeholder = lang==="fr" ? "Nom, équipe, ou sujet..." : "Name, team, or topic...";
  // Update poll send buttons
