<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICN Design Sprint — 28 mars 2026</title>
<style>
:root {
  --green:#2E7D32; --gl:#E8F5E9;
  --purple:#7B1FA2; --pl:#F3E5F5;
  --orange:#E65100; --ol:#FFF3E0;
  --pink:#C2185B; --pkl:#FCE4EC;
  --cyan:#00838F; --cl:#E0F7FA;
  --blue:#1565C0; --bl:#E3F2FD;
  --gold:#F9A825;
  --dark:#263238; --gray:#607D8B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#333;-webkit-tap-highlight-color:transparent;}

/* Header */
.hdr{background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;padding:16px;text-align:center;position:relative;}
.hdr h1{font-size:1.2em;margin-bottom:2px;}
.hdr .sub{font-size:0.78em;opacity:0.85;}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:0;}
.tabs .tb{flex:1 0 auto;padding:10px 10px;text-align:center;cursor:pointer;font-weight:600;font-size:0.72em;border-bottom:3px solid transparent;color:#888;white-space:nowrap;transition:all .2s;min-width:0;}
.tabs .tb.act{border-bottom-color:#1565C0;color:#1565C0;background:#E3F2FD;}
.tabs .tb:active{background:#f0f0f0;}

/* Panels */
.pnl{display:none;max-width:1100px;margin:0 auto;padding:14px;}
.pnl.act{display:block;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.st{background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.st .n{font-size:1.4em;font-weight:700;color:#1565C0;}
.st .l{font-size:0.65em;color:#607D8B;}

/* Section */
.sec{background:#fff;border-radius:12px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;}
.sec-h{background:var(--dark);color:#fff;padding:10px 14px;font-size:0.88em;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
.sec-h .bdg{background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:0.75em;}

/* Fac zone */
.fz{border-left:4px solid #1565C0;margin:10px 12px;padding:6px 10px;background:#FAFAFA;border-radius:0 8px 8px 0;}
.fz h3{font-size:0.82em;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.fb{color:#fff;padding:2px 8px;border-radius:10px;font-size:0.68em;white-space:nowrap;}

/* Room */
.rm{border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:8px;}
.rm-n{background:#ECEFF1;padding:5px 8px;font-weight:600;font-size:0.78em;display:flex;justify-content:space-between;}
.rm-n .c{font-size:0.72em;color:#607D8B;}
.rm .tms{padding:4px 8px;}

/* Team row (clickable) */
.tr{padding:3px 0;border-bottom:1px solid #f0f0f0;font-size:0.78em;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s;}
.tr:last-child{border-bottom:none;}
.tr:active,.tr:hover{background:#E3F2FD;}
.tn{font-weight:600;}
.tc{color:#607D8B;font-size:0.85em;}
.tt{font-size:0.6em;padding:1px 5px;border-radius:6px;}
.tt-m{background:#E3F2FD;color:#1565C0;}
.tt-f{background:#FFF3E0;color:#E65100;}
.tt-b{background:#E8F5E9;color:#2E7D32;}
.tt-c{background:#FCE4EC;color:#C2185B;}
.tr .arrow{margin-left:auto;color:#bbb;font-size:0.9em;}

/* Village card */
.vg{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px;}
.vc{border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08);}
.vc .vh{padding:10px 12px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.vc .vh h3{font-size:0.88em;}
.vc .vh .vi{font-size:0.68em;opacity:.9;text-align:right;}
.vc .vb{background:#fff;padding:8px 12px;}
.vc .vt{padding:4px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;font-size:0.8em;}
.vc .vt:last-child{border-bottom:none;}
.vc .vl{padding:6px 10px;font-size:0.72em;background:#FAFAFA;border-top:1px solid #eee;}
.mv{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#FFF8E1;color:#F57F17;}
.sy{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#E8F5E9;color:#2E7D32;}
.fl{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#FFEBEE;color:#C62828;}

/* Equipes list */
.eq-grid{display:grid;grid-template-columns:1fr;gap:8px;}
.eq-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .1s;}
.eq-card:active{transform:scale(.98);}
.eq-top{padding:8px 12px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.eq-top h4{font-size:0.88em;}
.eq-top .eq-info{font-size:0.7em;opacity:.9;}
.eq-members{padding:8px 12px;display:none;}
.eq-card.open .eq-members{display:block;}
.eq-m{font-size:0.78em;padding:2px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.eq-m:last-child{border-bottom:none;}

/* Timeline */
.tl{position:relative;padding-left:24px;margin:12px 0;}
.tl::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:3px;background:linear-gradient(#1565C0,#7B1FA2,#E65100);border-radius:2px;}
.tl-i{position:relative;margin-bottom:14px;}
.tl-d{position:absolute;left:-19px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px #1565C0;}
.tl-i h4{font-size:0.85em;margin-bottom:2px;}
.tl-i p{font-size:0.75em;color:#555;line-height:1.4;}

/* Finale */
.fin{background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border:2px solid #F9A825;border-radius:12px;padding:16px;margin-bottom:14px;text-align:center;}
.fin h3{color:#E65100;font-size:1em;margin-bottom:6px;}
.fin p{font-size:0.82em;color:#555;}

/* Table */
.stbl{width:100%;border-collapse:collapse;font-size:0.76em;}
.stbl th{background:#ECEFF1;padding:6px 8px;text-align:left;font-weight:600;}
.stbl td{padding:4px 8px;border-bottom:1px solid #f0f0f0;}

/* Move items */
.mi{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:0.8em;flex-wrap:wrap;}
.mi:last-child{border-bottom:none;}
.ma{color:#F57F17;font-weight:700;}
.tf{background:#FFEBEE;padding:1px 6px;border-radius:6px;color:#C62828;font-size:0.7em;font-weight:600;}
.ts{background:#E8F5E9;padding:1px 6px;border-radius:6px;color:#2E7D32;font-size:0.7em;font-weight:600;}

/* Chatbot */
.chat-btn{position:fixed;bottom:16px;right:16px;height:48px;border-radius:24px;background:linear-gradient(135deg,#1565C0,#0D47A1);color:#fff;border:none;font-size:0.85em;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(21,101,192,.4);z-index:200;display:flex;align-items:center;justify-content:center;gap:6px;padding:0 18px;transition:transform .2s;animation:chatPulse 3s ease-in-out infinite;}
.chat-btn:active{transform:scale(.9);}
@keyframes chatPulse{0%,100%{box-shadow:0 4px 16px rgba(21,101,192,.4)}50%{box-shadow:0 4px 24px rgba(21,101,192,.6)}}
.chat-box{position:fixed;bottom:76px;right:12px;width:calc(100vw - 24px);max-width:360px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:200;display:none;overflow:hidden;max-height:70vh;flex-direction:column;}
.chat-box.open{display:flex;}
.chat-hdr{background:#1565C0;color:#fff;padding:12px 16px;font-weight:600;font-size:0.88em;display:flex;justify-content:space-between;align-items:center;}
.chat-hdr .close{cursor:pointer;font-size:1.2em;opacity:.8;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;min-height:200px;max-height:50vh;}
.chat-msg{margin-bottom:10px;font-size:0.82em;line-height:1.5;}
.chat-msg.bot{background:#f0f4f8;padding:8px 12px;border-radius:12px 12px 12px 2px;max-width:90%;}
.chat-msg.user{background:#1565C0;color:#fff;padding:8px 12px;border-radius:12px 12px 2px 12px;max-width:80%;margin-left:auto;}
.chat-input{display:flex;border-top:1px solid #eee;padding:8px;}
.chat-input input{flex:1;border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:0.85em;outline:none;}
.chat-input input:focus{border-color:#1565C0;}
.chat-input button{margin-left:6px;background:#1565C0;color:#fff;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1em;}

/* Modal overlay */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.modal-h{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0;}
.modal-h h3{font-size:0.95em;}
.modal-h .mx{cursor:pointer;font-size:1.2em;opacity:.8;padding:4px 8px;}
.modal-body{padding:12px 16px;}
.modal-info{font-size:0.78em;color:#607D8B;margin-bottom:8px;line-height:1.6;}
.modal-member{font-size:0.82em;padding:4px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.modal-member:last-child{border-bottom:none;}

/* Poll styles */
.poll-waiting{text-align:center;padding:40px 20px;color:#607D8B;}
.poll-waiting .pw-icon{font-size:2.5em;margin-bottom:12px;}
.poll-waiting .pw-title{font-size:1em;font-weight:600;color:#263238;margin-bottom:6px;}
.poll-waiting .pw-sub{font-size:0.8em;line-height:1.5;}
.poll-q{background:#fff;border-radius:14px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;display:none;}
.poll-q.active{display:block;animation:pollSlide .4s ease-out;}
@keyframes pollSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.poll-qh{background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;padding:16px 18px;}
.poll-qh h3{font-size:1.05em;margin-bottom:4px;line-height:1.3;}
.poll-qh .poll-sub{font-size:0.78em;opacity:.85;font-style:italic;}
.poll-qnum{font-size:0.65em;opacity:.6;margin-bottom:6px;}
.poll-body{padding:16px 18px;}
.poll-input{width:100%;border:2px solid #e0e0e0;border-radius:12px;padding:12px 16px;font-size:1em;outline:none;resize:none;font-family:inherit;transition:border .2s;-webkit-appearance:none;}
.poll-input:focus{border-color:#1565C0;}
.poll-charcount{font-size:0.7em;color:#B0BEC5;text-align:right;margin-top:4px;transition:color .2s;}
.poll-charcount.warn{color:#E65100;}
.poll-send{background:#1565C0;color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:1em;font-weight:600;cursor:pointer;margin-top:10px;width:100%;transition:all .2s;-webkit-appearance:none;}
.poll-send:active{background:#0D47A1;transform:scale(.98);}
.poll-send:disabled{background:#B0BEC5;cursor:default;transform:none;}
.poll-done{text-align:center;padding:24px;color:#2E7D32;font-size:0.95em;}
.poll-done .pd-icon{font-size:2em;margin-bottom:8px;}
.poll-done .pd-text{font-weight:600;}
.poll-done .pd-wait{font-size:0.78em;color:#607D8B;margin-top:6px;}
.poll-count{font-size:0.75em;color:#607D8B;margin-top:8px;text-align:center;font-weight:600;}
/* Word cloud */
.wc-box{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:14px;min-height:180px;text-align:center;overflow:hidden;}
.wc-word{display:inline-block;padding:4px 10px;margin:3px;border-radius:20px;font-weight:600;animation:wcIn .4s ease-out;transition:all .3s;}
@keyframes wcIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
/* Open text results */
.ot-list{max-height:400px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ot-item{background:#f8f9fa;border-left:3px solid #1565C0;padding:8px 12px;margin:6px 0;border-radius:0 8px 8px 0;font-size:0.82em;animation:otIn .3s ease-out;word-break:break-word;}
@keyframes otIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
/* Journey Map */
.jm-box{background:#fff;border-radius:14px;padding:16px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:none;}
.jm-box.visible{display:block;}
.jm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;}
.jm-loc{border-radius:10px;padding:10px;text-align:center;cursor:default;transition:transform .2s;}
.jm-loc .jm-n{font-weight:700;font-size:0.75em;margin-bottom:2px;}
.jm-loc .jm-c{font-size:1.3em;font-weight:700;}
.jm-loc .jm-l{font-size:0.58em;opacity:.7;margin-top:2px;}
/* Presenter mode */
.presenter .hdr,.presenter .tabs,.presenter .chat-btn,.presenter .chat-box{display:none!important;}
.presenter .pnl{max-width:100%;padding:20px 40px;}
.presenter .poll-waiting{padding:80px 20px;}
.presenter .poll-waiting .pw-icon{font-size:4em;}
.presenter .poll-waiting .pw-title{font-size:1.6em;}
.presenter .wc-box{min-height:350px;}
.presenter .wc-word{font-size:1.3em!important;padding:6px 18px!important;margin:5px!important;}
.presenter .ot-list{max-height:500px;}
.presenter .ot-item{font-size:1em;padding:10px 16px;}
.presenter .jm-grid{grid-template-columns:repeat(5,1fr);}
.presenter .jm-loc .jm-c{font-size:2.2em;}
.presenter .jm-loc .jm-n{font-size:0.85em;}
.presenter .poll-qh h3{font-size:1.6em;}
.presenter .poll-qh .poll-sub{font-size:1em;}
.presenter .poll-count{font-size:1.1em;}
.presenter .poll-body{display:none;}
/* Admin panel */
.adm-panel{background:#263238;color:#fff;border-radius:14px;padding:16px;margin-bottom:16px;}
.adm-panel h3{font-size:0.95em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.adm-row{display:flex;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid #37474F;flex-wrap:wrap;}
.adm-row:last-child{border-bottom:none;}
.adm-row .adm-label{flex:1;font-size:0.82em;min-width:120px;}
.adm-btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.8em;font-weight:600;transition:all .15s;}
.adm-btn:active{transform:scale(.95);}
.adm-btn-go{background:#2E7D32;color:#fff;}
.adm-btn-stop{background:#F57F17;color:#fff;}
.adm-btn-danger{background:#C62828;color:#fff;}
.adm-btn-export{background:#1565C0;color:#fff;}
.adm-btn:disabled{background:#555;color:#999;cursor:default;transform:none;}
.adm-status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
.adm-status.on{background:#4CAF50;box-shadow:0 0 6px #4CAF50;}
.adm-status.off{background:#616161;}

/* Responsive */
@media(min-width:600px){
  .stats{grid-template-columns:repeat(6,1fr);}
  .vg{grid-template-columns:1fr 1fr;}
  .eq-grid{grid-template-columns:1fr 1fr;}
  .rm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .jm-grid{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:900px){
  .vg{grid-template-columns:repeat(3,1fr);}
  .eq-grid{grid-template-columns:repeat(3,1fr);}
  .jm-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>

function init(){
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");
  tabDefs.forEach((t,i) => {
    const tb = document.createElement("div");
    tb.className = "tb" + (i===0?" act":"");
    tb.textContent = t.label;
    tb.dataset.id = t.id;
    tb.addEventListener("click", () => switchTab(t.id));
    tabsEl.appendChild(tb);
  });
  panelsEl.innerHTML = buildOverview() + buildAgenda() + buildPhase1() + buildPhase2() + buildEquipes() + buildFinale() + buildTransition();
  document.querySelectorAll(".team-click").forEach(el => {
    el.addEventListener("click", () => showTeamModal(el.dataset.team));
  });
  document.querySelectorAll(".eq-card").forEach(el => {
    el.addEventListener("click", () => el.classList.toggle("open"));
  });
}

function switchTab(id){
  document.querySelectorAll(".tb").forEach(t => t.classList.toggle("act", t.dataset.id===id));
  document.querySelectorAll(".pnl").forEach(p => p.classList.toggle("act", p.id==="p-"+id));
}

function teamRow(t, showMove){
  const typeClass = t.type==="MIXTE"?"tt-m":t.type==="FR PUR"?"tt-f":t.type==="COMEX"?"tt-m":"tt-b";
  let badge = "";
  if(showMove){
    if(t.p1Room===t.p2Room) badge = `<span class="sy">reste</span>`;
    else if(["Conseil"].includes(t.p1Room) && ["207","205","206"].includes(t.p2Room)) badge = `<span class="fl">${t.p1Room} &#8594; ${t.p2Room}</span>`;
    else badge = `<span class="mv">${t.p1Room} &#8594; ${t.p2Room}</span>`;
  }
  const typeLabel = t.type==="COMEX"?"":t.type;
  return `<div class="tr team-click" data-team="${t.name}"><span class="tn">${t.name}</span> ${typeLabel?`<span class="tt ${typeClass}">${typeLabel}</span>`:""} <span class="tc">— ${t.members.length}</span>${badge}<span class="arrow">&#9656;</span></div>`;
}

function chatSearch(query){
  const q = query.trim().toLowerCase();
  if(!q) return "Tape ton nom de famille ou un nom d'equipe !";

  // Search team by name
  const teamMatch = TEAMS.find(t=>t.name.toLowerCase()===q || t.name.toLowerCase().includes(q));
  if(teamMatch){
    const v = VILLAGES[teamMatch.village];
    return `<strong>Equipe ${teamMatch.name}</strong> (${teamMatch.members.length} pers.)<br>
      Phase 1 : <strong>${ROOM_NAMES[teamMatch.p1Room]}</strong><br>
      Phase 2 : <strong>${v.name}</strong> en <strong>${ROOM_NAMES[teamMatch.p2Room]}</strong><br>
      Facilitateur : ${teamMatch.fac}`;
  }

  // Search person by name
  let found = [];
  TEAMS.forEach(t=>{
    t.members.forEach(m=>{
      const full = (m[0]+" "+m[1]).toLowerCase();
      if(full.includes(q) || m[1].toLowerCase().includes(q) || m[0].toLowerCase().includes(q)){
        found.push({person:m, team:t});
      }
    });
  });

  if(found.length===1){
    const {person:m, team:t} = found[0];
    const v = VILLAGES[t.village];
    return `<strong>${m[0]} ${m[1]}</strong><br>
      Equipe : <strong>${t.name}</strong><br>
      Phase 1 : <strong>${ROOM_NAMES[t.p1Room]}</strong><br>
      Phase 2 : <strong>${v.name}</strong> en <strong>${ROOM_NAMES[t.p2Room]}</strong><br>
      Pitch Final : <strong>Salle du Conseil</strong>`;
  }
  if(found.length>1){
    return `${found.length} resultats :<br>` + found.map(f=>`- <strong>${f.person[0]} ${f.person[1]}</strong> → equipe ${f.team.name}`).join("<br>");
  }
  return `Pas de resultat pour "${query}". Essaie ton nom de famille ou un nom de ville (Tokyo, Seoul...).`;
}

function classifyResponse(text){
  const t = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const scores = {};
  JM_LOCATIONS.forEach(loc=>{
    scores[loc.id] = 0;
    loc.keywords.forEach(kw=>{
      if(t.includes(kw)) scores[loc.id] += 1;
    });
  });
  const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  return best[1] > 0 ? best[0] : "doubt"; // default
}

  }).catch(err=>{
    btn.disabled = false;
    btn.textContent = "Envoyer / Submit";
  });
}

function listenPolls(){
  if(!fbReady) return;
  POLL_QUESTIONS.forEach(q=>{
    // Listen responses
    fbDb.ref("icn-polls/responses/"+q.id).on("value", snap=>{
      const data = snap.val();
      const responses = data ? Object.values(data) : [];
      pollCache[q.id] = responses;
      const countEl = document.getElementById("poll-count-"+q.id);
      if(countEl) countEl.textContent = responses.length + " reponse" + (responses.length>1?"s":"");
      renderPollResults(q, responses);
      if(q.id === "q3") updateJourneyMap(responses);
    });
    // Listen active state — one question at a time
    fbDb.ref("icn-polls/active/"+q.id).on("value", snap=>{
      const active = snap.val() === true;
      const el = document.getElementById("poll-"+q.id);
      if(el) el.classList.toggle("active", active);
      // Update admin status indicator
      const st = document.getElementById("adm-st-"+q.id);
      if(st){st.classList.toggle("on",active);st.classList.toggle("off",!active);}
      // Show/hide waiting screen
      updateWaitingScreen();
      // Show journey map when q3 is active or has responses
      const jm = document.getElementById("jmBox");
      if(jm && q.id==="q3") jm.classList.toggle("visible", active || (pollCache.q3 && pollCache.q3.length>0));
    });
  });
}

function updateWaitingScreen(){
  const waiting = document.getElementById("pollWaiting");
  if(!waiting) return;
  const anyActive = POLL_QUESTIONS.some(q=>{
    const el = document.getElementById("poll-"+q.id);
    return el && el.classList.contains("active");
  });
  waiting.style.display = anyActive ? "none" : "";
}

function renderPollResults(q, responses){
  const c = document.getElementById("poll-results-"+q.id);
  if(!c) return;
  if(q.type === "wordcloud") renderWordCloud(c, responses);
  else renderOpenText(c, responses);
}

function renderWordCloud(container, responses){
  const counts = {};
  responses.forEach(r=>{
    r.text.toLowerCase().trim().split(/[\s,;.!?]+/).filter(w=>w.length>2).forEach(w=>{
      const clean = w.replace(/[^a-zA-ZÀ-ÿ\-]/g,"");
      if(clean.length>2) counts[clean] = (counts[clean]||0) + 1;
    });
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,50);
  if(!sorted.length){container.innerHTML="";return;}
  const maxC = sorted[0][1];
  const colors = ["#1565C0","#E65100","#7B1FA2","#2E7D32","#C2185B","#00838F","#F57F17","#455A64","#E53935","#00695C"];
  container.innerHTML = `<div class="wc-box">${sorted.map(([w,c],i)=>{
    const sz = 0.7 + (c/maxC)*1.8;
    const col = colors[i%colors.length];
    return `<span class="wc-word" style="font-size:${sz}em;color:${col};background:${col}15;">${w}<sup style="font-size:0.5em;opacity:.5;">${c}</sup></span>`;
  }).join("")}</div>`;
}

function renderOpenText(container, responses){
  const items = responses.slice(-200).reverse();
  container.innerHTML = `<div class="ot-list">${items.map(r=>`<div class="ot-item">${escHtml(r.text)}</div>`).join("")}</div>`;
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function submitJourneyMap(locId){
  if(!fbReady) return;
  const uid = localStorage.getItem("icn_uid") || (()=>{const id="u_"+Math.random().toString(36).slice(2,10);localStorage.setItem("icn_uid",id);return id;})();
  fbDb.ref("icn-polls/responses/q3").push({
    text: locId, uid: uid, ts: Date.now()
  });
  // Visual feedback — highlight selected
  document.querySelectorAll(".jm-selectable").forEach(el=>{
    el.style.opacity = el.dataset.loc===locId ? "1" : "0.4";
    el.style.transform = el.dataset.loc===locId ? "scale(1.05)" : "scale(0.95)";
  });
  setTimeout(()=>{
    document.querySelectorAll(".jm-selectable").forEach(el=>{el.style.opacity="1";el.style.transform="";});
  }, 1500);
}

function updateJourneyMap(responses){
  const grid = document.getElementById("jmGrid");
  const box = document.getElementById("jmBox");
  if(!grid) return;
  if(!responses || !responses.length){
    grid.innerHTML = JM_LOCATIONS.map(loc=>`<div class="jm-loc" style="background:${loc.bg};border:2px solid ${loc.color}20;">
      <div class="jm-n" style="color:${loc.color};">${loc.nameFr}</div>
      <div class="jm-c" style="color:${loc.color};">—</div>
      <div class="jm-l" style="color:${loc.color};">${loc.name}</div>
    </div>`).join("");
    return;
  }
  if(box) box.classList.add("visible");
  const locCounts = {};
  JM_LOCATIONS.forEach(l=>locCounts[l.id]=0);
  // Q3 responses are direct location IDs
  responses.forEach(r=>{
    const loc = JM_LOCATIONS.find(l=>l.id===r.text);
    if(loc) locCounts[loc.id]++;
    else locCounts[classifyResponse(r.text)]++;
  });
  const sorted = JM_LOCATIONS.slice().sort((a,b)=>(locCounts[b.id]||0)-(locCounts[a.id]||0));
  grid.innerHTML = sorted.map(loc=>{
    const count = locCounts[loc.id]||0;
    return `<div class="jm-loc" style="background:${loc.bg};border:2px solid ${loc.color}${count>0?'50':'15'};">
      <div class="jm-n" style="color:${loc.color};">${loc.nameFr}</div>
      <div class="jm-c" style="color:${loc.color};">${count||"—"}</div>
      <div class="jm-l" style="color:${loc.color};">${loc.name}</div>
    </div>`;
  }).join("");
}

// Admin
function pollAdmin(action, target){
  if(!fbReady) return;
  if(action==="activate"){
    // Only one question at a time
    POLL_QUESTIONS.forEach(q=>{
      fbDb.ref("icn-polls/active/"+q.id).set(q.id===target);
    });
  } else if(action==="deactivate"){
    if(target==="all") POLL_QUESTIONS.forEach(q=>fbDb.ref("icn-polls/active/"+q.id).set(false));
    else fbDb.ref("icn-polls/active/"+target).set(false);
  } else if(action==="reset"){
    const msg = target==="all" ? "Supprimer TOUTES les reponses ?" : "Supprimer les reponses de Q"+target.replace("q","")+" ?";
    if(confirm(msg)){
      if(target==="all"){
        fbDb.ref("icn-polls/responses").remove();
        POLL_QUESTIONS.forEach(q=>localStorage.removeItem("icn_voted_"+q.id));
      } else {
        fbDb.ref("icn-polls/responses/"+target).remove();
        localStorage.removeItem("icn_voted_"+target);
      }
      location.reload();
    }
  }
}

// Export to Excel (CSV download)
function exportPolls(){
  if(!fbReady) return;
  fbDb.ref("icn-polls/responses").once("value", snap=>{
    const data = snap.val();
    if(!data) return alert("Aucune reponse");
    let csv = "\uFEFF"; // BOM for Excel UTF-8
    csv += "Question;Type;Reponse;Timestamp\n";
    POLL_QUESTIONS.forEach(q=>{
      const responses = data[q.id] ? Object.values(data[q.id]) : [];
      responses.forEach(r=>{
        const date = new Date(r.ts).toLocaleString("fr-FR");
        const text = r.text.replace(/"/g,'""').replace(/;/g,",");
        csv += `"${q.fr}";"${q.type}";"${text}";"${date}"\n`;
      });
    });
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "ICN_Sondages_"+new Date().toISOString().slice(0,10)+".csv";
    link.click();
  });
}

// Presenter mode
if(window.location.search.includes("presenter")){
  document.body.classList.add("presenter");
}
