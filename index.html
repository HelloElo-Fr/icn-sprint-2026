<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICN Design Sprint — 28 mars 2026</title>
<style>
:root {
  --green:#2E7D32; --gl:#E8F5E9;
  --purple:#7B1FA2; --pl:#F3E5F5;
  --orange:#E65100; --ol:#FFF3E0;
  --pink:#C2185B; --pkl:#FCE4EC;
  --cyan:#00838F; --cl:#E0F7FA;
  --blue:#1565C0; --bl:#E3F2FD;
  --gold:#F9A825;
  --dark:#263238; --gray:#607D8B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#333;-webkit-tap-highlight-color:transparent;}

/* Header */
.hdr{background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;padding:16px;text-align:center;position:relative;}
.hdr h1{font-size:1.2em;margin-bottom:2px;}
.hdr .sub{font-size:0.78em;opacity:0.85;}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs .tb{flex:0 0 auto;padding:10px 12px;text-align:center;cursor:pointer;font-weight:600;font-size:0.75em;border-bottom:3px solid transparent;color:#888;white-space:nowrap;transition:all .2s;min-width:0;}
.tabs .tb.act{border-bottom-color:#1565C0;color:#1565C0;background:#E3F2FD;}
.tabs .tb:active{background:#f0f0f0;}

/* Panels */
.pnl{display:none;max-width:1100px;margin:0 auto;padding:14px;}
.pnl.act{display:block;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.st{background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.st .n{font-size:1.4em;font-weight:700;color:#1565C0;}
.st .l{font-size:0.65em;color:#607D8B;}

/* Section */
.sec{background:#fff;border-radius:12px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;}
.sec-h{background:var(--dark);color:#fff;padding:10px 14px;font-size:0.88em;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
.sec-h .bdg{background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:0.75em;}

/* Fac zone */
.fz{border-left:4px solid #1565C0;margin:10px 12px;padding:6px 10px;background:#FAFAFA;border-radius:0 8px 8px 0;}
.fz h3{font-size:0.82em;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.fb{color:#fff;padding:2px 8px;border-radius:10px;font-size:0.68em;white-space:nowrap;}

/* Room */
.rm{border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:8px;}
.rm-n{background:#ECEFF1;padding:5px 8px;font-weight:600;font-size:0.78em;display:flex;justify-content:space-between;}
.rm-n .c{font-size:0.72em;color:#607D8B;}
.rm .tms{padding:4px 8px;}

/* Team row (clickable) */
.tr{padding:3px 0;border-bottom:1px solid #f0f0f0;font-size:0.78em;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s;}
.tr:last-child{border-bottom:none;}
.tr:active,.tr:hover{background:#E3F2FD;}
.tn{font-weight:600;}
.tc{color:#607D8B;font-size:0.85em;}
.tt{font-size:0.6em;padding:1px 5px;border-radius:6px;}
.tt-m{background:#E3F2FD;color:#1565C0;}
.tt-f{background:#FFF3E0;color:#E65100;}
.tt-b{background:#E8F5E9;color:#2E7D32;}
.tt-c{background:#FCE4EC;color:#C2185B;}
.tr .arrow{margin-left:auto;color:#bbb;font-size:0.9em;}

/* Village card */
.vg{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px;}
.vc{border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08);}
.vc .vh{padding:10px 12px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.vc .vh h3{font-size:0.88em;}
.vc .vh .vi{font-size:0.68em;opacity:.9;text-align:right;}
.vc .vb{background:#fff;padding:8px 12px;}
.vc .vt{padding:4px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;font-size:0.8em;}
.vc .vt:last-child{border-bottom:none;}
.vc .vl{padding:6px 10px;font-size:0.72em;background:#FAFAFA;border-top:1px solid #eee;}
.mv{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#FFF8E1;color:#F57F17;}
.sy{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#E8F5E9;color:#2E7D32;}
.fl{font-size:0.62em;padding:1px 5px;border-radius:6px;background:#FFEBEE;color:#C62828;}

/* Equipes list */
.eq-grid{display:grid;grid-template-columns:1fr;gap:8px;}
.eq-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .1s;}
.eq-card:active{transform:scale(.98);}
.eq-top{padding:8px 12px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.eq-top h4{font-size:0.88em;}
.eq-top .eq-info{font-size:0.7em;opacity:.9;}
.eq-members{padding:8px 12px;display:none;}
.eq-card.open .eq-members{display:block;}
.eq-m{font-size:0.78em;padding:2px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.eq-m:last-child{border-bottom:none;}

/* Timeline */
.tl{position:relative;padding-left:24px;margin:12px 0;}
.tl::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:3px;background:linear-gradient(#1565C0,#7B1FA2,#E65100);border-radius:2px;}
.tl-i{position:relative;margin-bottom:14px;}
.tl-d{position:absolute;left:-19px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px #1565C0;}
.tl-i h4{font-size:0.85em;margin-bottom:2px;}
.tl-i p{font-size:0.75em;color:#555;line-height:1.4;}

/* Finale */
.fin{background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border:2px solid #F9A825;border-radius:12px;padding:16px;margin-bottom:14px;text-align:center;}
.fin h3{color:#E65100;font-size:1em;margin-bottom:6px;}
.fin p{font-size:0.82em;color:#555;}

/* Table */
.stbl{width:100%;border-collapse:collapse;font-size:0.76em;}
.stbl th{background:#ECEFF1;padding:6px 8px;text-align:left;font-weight:600;}
.stbl td{padding:4px 8px;border-bottom:1px solid #f0f0f0;}

/* Move items */
.mi{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:0.8em;flex-wrap:wrap;}
.mi:last-child{border-bottom:none;}
.ma{color:#F57F17;font-weight:700;}
.tf{background:#FFEBEE;padding:1px 6px;border-radius:6px;color:#C62828;font-size:0.7em;font-weight:600;}
.ts{background:#E8F5E9;padding:1px 6px;border-radius:6px;color:#2E7D32;font-size:0.7em;font-weight:600;}

/* Chatbot */
.chat-btn{position:fixed;bottom:16px;right:16px;width:52px;height:52px;border-radius:50%;background:#1565C0;color:#fff;border:none;font-size:1.4em;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .2s;}
.chat-btn:active{transform:scale(.9);}
.chat-box{position:fixed;bottom:76px;right:12px;width:calc(100vw - 24px);max-width:360px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:200;display:none;overflow:hidden;max-height:70vh;flex-direction:column;}
.chat-box.open{display:flex;}
.chat-hdr{background:#1565C0;color:#fff;padding:12px 16px;font-weight:600;font-size:0.88em;display:flex;justify-content:space-between;align-items:center;}
.chat-hdr .close{cursor:pointer;font-size:1.2em;opacity:.8;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;min-height:200px;max-height:50vh;}
.chat-msg{margin-bottom:10px;font-size:0.82em;line-height:1.5;}
.chat-msg.bot{background:#f0f4f8;padding:8px 12px;border-radius:12px 12px 12px 2px;max-width:90%;}
.chat-msg.user{background:#1565C0;color:#fff;padding:8px 12px;border-radius:12px 12px 2px 12px;max-width:80%;margin-left:auto;}
.chat-input{display:flex;border-top:1px solid #eee;padding:8px;}
.chat-input input{flex:1;border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:0.85em;outline:none;}
.chat-input input:focus{border-color:#1565C0;}
.chat-input button{margin-left:6px;background:#1565C0;color:#fff;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1em;}

/* Modal overlay */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.modal-h{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0;}
.modal-h h3{font-size:0.95em;}
.modal-h .mx{cursor:pointer;font-size:1.2em;opacity:.8;padding:4px 8px;}
.modal-body{padding:12px 16px;}
.modal-info{font-size:0.78em;color:#607D8B;margin-bottom:8px;line-height:1.6;}
.modal-member{font-size:0.82em;padding:4px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;}
.modal-member:last-child{border-bottom:none;}

/* Responsive */
@media(min-width:600px){
  .stats{grid-template-columns:repeat(6,1fr);}
  .vg{grid-template-columns:1fr 1fr;}
  .eq-grid{grid-template-columns:1fr 1fr;}
  .rm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
}
@media(min-width:900px){
  .vg{grid-template-columns:repeat(3,1fr);}
  .eq-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

function init(){
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");
  tabDefs.forEach((t,i) => {
    const tb = document.createElement("div");
    tb.className = "tb" + (i===0?" act":"");
    tb.textContent = t.label;
    tb.dataset.id = t.id;
    tb.addEventListener("click", () => switchTab(t.id));
    tabsEl.appendChild(tb);
  });
  panelsEl.innerHTML = buildOverview() + buildPhase1() + buildPhase2() + buildEquipes() + buildFinale() + buildTransition();
  document.querySelectorAll(".team-click").forEach(el => {
    el.addEventListener("click", () => showTeamModal(el.dataset.team));
  });
  document.querySelectorAll(".eq-card").forEach(el => {
    el.addEventListener("click", () => el.classList.toggle("open"));

function switchTab(id){
  document.querySelectorAll(".tb").forEach(t => t.classList.toggle("act", t.dataset.id===id));
  document.querySelectorAll(".pnl").forEach(p => p.classList.toggle("act", p.id==="p-"+id));
}

function teamRow(t, showMove){
  const typeClass = t.type==="MIXTE"?"tt-m":t.type==="FR PUR"?"tt-f":t.type==="COMEX"?"tt-c":"tt-b";
  let badge = "";
  if(showMove){
    if(t.p1Room===t.p2Room) badge = `<span class="sy">reste</span>`;
    else if(["Conseil"].includes(t.p1Room) && ["207","205","206"].includes(t.p2Room)) badge = `<span class="fl">${t.p1Room} &#8594; ${t.p2Room}</span>`;
    else badge = `<span class="mv">${t.p1Room} &#8594; ${t.p2Room}</span>`;
  }
  return `<div class="tr team-click" data-team="${t.name}"><span class="tn">${t.name}</span> <span class="tt ${typeClass}">${t.type}</span> <span class="tc">— ${t.members.length}</span>${badge}<span class="arrow">&#9656;</span></div>`;
}

      <strong>Facilitateur :</strong> ${t.fac}

}

function chatSearch(query){
  const q = query.trim().toLowerCase();
  if(!q) return "Tape ton nom de famille ou un nom d'equipe !";

  // Search team by name
  const teamMatch = TEAMS.find(t=>t.name.toLowerCase()===q || t.name.toLowerCase().includes(q));
  if(teamMatch){
    const v = VILLAGES[teamMatch.village];
    return `<strong>Equipe ${teamMatch.name}</strong> (${teamMatch.members.length} pers.)<br>
      Phase 1 : <strong>${ROOM_NAMES[teamMatch.p1Room]}</strong><br>
      Phase 2 : <strong>${v.name}</strong> en <strong>${ROOM_NAMES[teamMatch.p2Room]}</strong><br>
      Facilitateur : ${teamMatch.fac}`;
  }

  // Search person by name
  let found = [];
  TEAMS.forEach(t=>{
    t.members.forEach(m=>{
      const full = (m[0]+" "+m[1]).toLowerCase();
      if(full.includes(q) || m[1].toLowerCase().includes(q) || m[0].toLowerCase().includes(q)){
        found.push({person:m, team:t});
      }
    });
  });

  if(found.length===1){
    const {person:m, team:t} = found[0];
    const v = VILLAGES[t.village];
    return `<strong>${m[0]} ${m[1]}</strong><br>
      Equipe : <strong>${t.name}</strong><br>
      Phase 1 : <strong>${ROOM_NAMES[t.p1Room]}</strong><br>
      Phase 2 : <strong>${v.name}</strong> en <strong>${ROOM_NAMES[t.p2Room]}</strong><br>
      Pitch Final : <strong>Salle du Conseil</strong>`;
  }
  if(found.length>1){
    return `${found.length} resultats :<br>` + found.map(f=>`- <strong>${f.person[0]} ${f.person[1]}</strong> → equipe ${f.team.name}`).join("<br>");
  }
  return `Pas de resultat pour "${query}". Essaie ton nom de famille ou un nom de ville (Tokyo, Seoul...).`;
}

function sendChat(){
  const input = document.getElementById("chatIn");
  const q = input.value.trim();
  if(!q) return;
  const msgs = document.getElementById("chatMsgs");
  msgs.innerHTML += `<div class="chat-msg user">${q}</div>`;
  const answer = chatSearch(q);
  msgs.innerHTML += `<div class="chat-msg bot">${answer}</div>`;
  input.value = "";
  msgs.scrollTop = msgs.scrollHeight;
}

document.getElementById("chatSend").addEventListener("click", sendChat);
document.getElementById("chatIn").addEventListener("keydown", e=>{if(e.key==="Enter")sendChat();});

// ============ SEARCH (equipes tab) ============
document.addEventListener("input", e=>{
  if(e.target.id==="eqSearch"){
    const q = e.target.value.toLowerCase();
    document.querySelectorAll(".eq-card").forEach(c=>{
      c.style.display = c.dataset.search.includes(q) ? "" : "none";
    });
  }
});
